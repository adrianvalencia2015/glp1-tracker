  <!-- ════════════════════════════════════════════════════
       STORAGE & DATA LAYER
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
const STORAGE_KEY = 'glp1tracker_v2';

const MEDS_DB = {
  tirzepatide: { name:"Tirzepatide", brand:"Mounjaro / Zepbound", halfLifeDays:5, tmaxDays:2 },
  semaglutide: { name:"Semaglutide", brand:"Ozempic / Wegovy",    halfLifeDays:7, tmaxDays:2 },
  retatrutide: { name:"Retatrutide", brand:"(investigational)",    halfLifeDays:6, tmaxDays:2 },
  liraglutide: { name:"Liraglutide", brand:"Victoza / Saxenda",   halfLifeDays:0.54, tmaxDays:0.5 },
  other:       { name:"Other",       brand:"",                     halfLifeDays:7, tmaxDays:2 },
};

function emptyStore() {
  return { meds:[], shots:[], weights:[], startWeight:null, goalWeight:null, startDate:null, palette:'cream' };
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveStore(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

// ── PK Math ────────────────────────────────────────────────────────────────
function singleShotLevel(dose, halfLifeDays, tmaxDays, elapsedDays) {
  if (elapsedDays < 0) return 0;
  const ke = Math.LN2 / halfLifeDays;
  const ka = Math.LN2 / tmaxDays;
  if (Math.abs(ka - ke) < 1e-6) return dose * ke * elapsedDays * Math.exp(-ke * elapsedDays);
  return Math.max(0, dose * (ka / (ka - ke)) * (Math.exp(-ke * elapsedDays) - Math.exp(-ka * elapsedDays)));
}

function totalDrugLevel(shots, halfLifeDays, tmaxDays, atTime = Date.now()) {
  return shots.reduce((sum, s) => {
    const elapsed = (atTime - new Date(s.date).getTime()) / 86400000;
    return sum + singleShotLevel(s.dose, halfLifeDays, tmaxDays, elapsed);
  }, 0);
}

function effectiveMg(shot, med) {
  if (shot.unit === 'mg') return shot.dose;
  if (shot.unit === 'mcg') return shot.dose / 1000;
  if (shot.unit === 'mL' && med?.concentration) return shot.dose * med.concentration;
  if (shot.unit === 'units' && med?.concentration && med?.syringeUnits)
    return shot.dose * (med.concentration / med.syringeUnits);
  return shot.dose;
}

function getCurrentLevel(store, atTime = Date.now()) {
  const med = store.meds[0];
  if (!med || !store.shots.length) return 0;
  const shots = store.shots.filter(s => s.medId === med.id).map(s => ({
    ...s, dose: effectiveMg(s, med)
  }));
  return totalDrugLevel(shots, med.halfLifeDays, med.tmaxDays, atTime);
}

function getPeakLevel(store) {
  const med = store.meds[0];
  if (!med) return 10;
  const ke = Math.LN2 / med.halfLifeDays;
  const T  = (med.scheduleIntervalDays || 7);
  const accum = 1 / (1 - Math.exp(-ke * T));
  const doseEff = effectiveMg({dose: med.currentDose, unit: med.unit}, med);
  return doseEff * 0.75 * accum;
}

function nextShotDate(store, atTime = Date.now()) {
  const med = store.meds[0];
  if (!med) return null;
  const shots = store.shots.filter(s => s.medId === med.id);
  if (!shots.length) return new Date(atTime);
  const last = new Date(shots[shots.length - 1].date).getTime();
  const interval = (med.scheduleIntervalDays || 7) * 86400000;
  return new Date(last + interval);
}

function daysUntil(date, atTime = Date.now()) {
  return Math.ceil((new Date(date).getTime() - atTime) / 86400000);
}

function fmtDate(d, opts) {
  return new Date(d).toLocaleDateString('en-US', opts || { month:'short', day:'numeric' });
}

function buildForecastCurve(store, pastDays = 28, futureDays = 14) {
  const med = store.meds[0];
  if (!med) return [];
  const now = Date.now();
  const shots = store.shots.filter(s => s.medId === med.id).map(s => ({
    ...s, dose: effectiveMg(s, med)
  }));
  const steps = 80;
  const totalDays = pastDays + futureDays;
  return Array.from({ length: steps + 1 }, (_, i) => {
    const t = now - pastDays * 86400000 + (i / steps) * totalDays * 86400000;
    return { t, level: totalDrugLevel(shots, med.halfLifeDays, med.tmaxDays, t) };
  });
}

Object.assign(window, {
  MEDS_DB, emptyStore, loadStore, saveStore,
  singleShotLevel, totalDrugLevel, effectiveMg,
  getCurrentLevel, getPeakLevel, nextShotDate, daysUntil, fmtDate, buildForecastCurve,
});
  </script>

  <!-- ════════════════════════════════════════════════════
       SHARED UI PRIMITIVES
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function Card({ children, p, style, dark, ink, padding=18, soft }) {
  return (
    <div style={{
      background: soft ? p.bgInset : p.bgElev,
      borderRadius: R.lg, padding,
      border: `0.5px solid ${p.line}`,
      ...(dark ? { background: ink || p.primary, color: p.primaryInk, border:'none' } : {}),
      ...style,
    }}>{children}</div>
  );
}

function Eyebrow({ children, p, color, style }) {
  return <div style={{
    fontFamily:TYPE.mono, fontSize:10, letterSpacing:'0.14em',
    textTransform:'uppercase', color:color||p.inkMuted, ...style,
  }}>{children}</div>;
}

function Ring({ size=200, stroke=16, value, max=1, color, track, children, p }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.min(1, Math.max(0, value / max));
  return (
    <div style={{ position:'relative', width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={track||p.bgInset} strokeWidth={stroke} fill="none" strokeLinecap="round"/>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={color||p.primary} strokeWidth={stroke} fill="none"
          strokeLinecap="round"
          strokeDasharray={`${c*pct} ${c*(1-pct)}`}
          style={{ transition:'stroke-dasharray 1s cubic-bezier(.3,.7,.3,1)' }}/>
      </svg>
      <div style={{
        position:'absolute', inset:0,
        display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column',
      }}>{children}</div>
    </div>
  );
}

function Sparkline({ data, width=200, height=60, color, fill, p, showDot }) {
  if (!data?.length) return null;
  const vals = data.map(d => typeof d === 'number' ? d : d.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const stepX = width / (vals.length - 1 || 1);
  const pts = vals.map((v,i) => [i*stepX, height-((v-min)/range)*(height-8)-4]);
  const d = pts.map((pt,i) => `${i===0?'M':'L'} ${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`).join(' ');
  const area = `${d} L ${width} ${height} L 0 ${height} Z`;
  const last = pts[pts.length-1];
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {fill && <path d={area} fill={fill}/>}
      <path d={d} stroke={color||p.primary} strokeWidth={2} fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      {showDot && <circle cx={last[0]} cy={last[1]} r={4} fill={color||p.primary} stroke={p.bgElev} strokeWidth={2.5}/>}
    </svg>
  );
}

function Chip({ children, p, active, color, style, onClick }) {
  return (
    <button onClick={onClick} style={{
      display:'inline-flex', alignItems:'center', gap:6,
      padding:'6px 12px', borderRadius:R.pill,
      background: active ? (color||p.ink) : 'transparent',
      color: active ? p.bgElev : p.ink,
      border: `0.5px solid ${active ? 'transparent' : p.line}`,
      fontFamily:TYPE.ui, fontSize:12, fontWeight:500,
      cursor:'pointer', letterSpacing:'0.005em',
      ...style,
    }}>{children}</button>
  );
}

function PillBtn({ children, p, onClick, kind='primary', style, icon, size='md', disabled }) {
  const sizes = { sm:{padY:8,fs:12}, md:{padY:12,fs:14}, lg:{padY:16,fs:15} }[size];
  const kinds = {
    primary:{ bg:p.ink, fg:p.bgElev, br:'transparent' },
    accent: { bg:p.accent, fg:'#fff', br:'transparent' },
    ghost:  { bg:'transparent', fg:p.ink, br:p.line },
    tint:   { bg:p.bgInset, fg:p.ink, br:'transparent' },
  }[kind];
  return (
    <button onClick={onClick} disabled={disabled} style={{
      display:'inline-flex', alignItems:'center', justifyContent:'center', gap:8,
      padding:`${sizes.padY}px 20px`, borderRadius:R.pill,
      background:kinds.bg, color:kinds.fg,
      border:`1px solid ${kinds.br}`,
      fontFamily:TYPE.ui, fontSize:sizes.fs, fontWeight:500,
      cursor:disabled?'not-allowed':'pointer',
      opacity:disabled?0.5:1,
      ...style,
    }}>{icon}{children}</button>
  );
}

function TabBar({ tabs, active, onTab, p, onLogShot }) {
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      paddingBottom:'max(28px, env(safe-area-inset-bottom))', paddingTop:8,
      background:`linear-gradient(to top, ${p.bg} 60%, ${p.bg}00)`,
      display:'flex', justifyContent:'space-around', alignItems:'center', zIndex:30,
    }}>
      {tabs.slice(0,2).map(t => (
        <button key={t.key} onClick={() => onTab(t.key)} style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:4,
          background:'none', border:'none', cursor:'pointer',
          padding:'6px 10px', color:active===t.key?p.ink:p.inkMuted,
          fontFamily:TYPE.ui, fontSize:10, fontWeight:500, letterSpacing:'0.02em',
          minWidth:60,
        }}>
          <t.icon size={22} color="currentColor"/>
          <span>{t.label}</span>
        </button>
      ))}
      <button onClick={onLogShot} style={{
        width:54, height:54, borderRadius:27,
        background:p.ink, color:p.bgElev,
        border:'none', cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow:`0 8px 20px ${p.ink}40`,
        marginTop:-22, flexShrink:0,
      }}>
        <Icons.Plus size={22} color={p.bgElev}/>
      </button>
      {tabs.slice(2).map(t => (
        <button key={t.key} onClick={() => onTab(t.key)} style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:4,
          background:'none', border:'none', cursor:'pointer',
          padding:'6px 10px', color:active===t.key?p.ink:p.inkMuted,
          fontFamily:TYPE.ui, fontSize:10, fontWeight:500, letterSpacing:'0.02em',
          minWidth:60,
        }}>
          <t.icon size={22} color="currentColor"/>
          <span>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function ScreenHeader({ p, eyebrow, title, action, sub }) {
  return (
    <div style={{ padding:'8px 22px 16px', display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
      <div>
        {eyebrow && <Eyebrow p={p} style={{ marginBottom:6 }}>{eyebrow}</Eyebrow>}
        <div style={{
          fontFamily:TYPE.display, fontSize:36, color:p.ink,
          letterSpacing:'-0.025em', lineHeight:0.95,
        }}>{title}</div>
        {sub && <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft, marginTop:6 }}>{sub}</div>}
      </div>
      {action}
    </div>
  );
}

function Delta({ value, unit, p, invert, style }) {
  const negative = value < 0;
  const good = invert ? !negative : negative;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:4,
      color:good?p.success:p.warn,
      fontFamily:TYPE.ui, fontSize:13, fontWeight:500, ...style,
    }}>
      <span>{negative?'↓':'↑'}</span>
      <span>{Math.abs(value)}{unit||''}</span>
    </span>
  );
}

Object.assign(window,{ Card,Eyebrow,Ring,Sparkline,Chip,PillBtn,TabBar,ScreenHeader,Delta });
  </script>

  <!-- ════════════════════════════════════════════════════
       ONBOARDING FLOW
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function Onboarding({ p, onComplete }) {
  const [step, setStep] = React.useState(0);
  const [name, setName] = React.useState('');
  const [medKey, setMedKey] = React.useState('tirzepatide');
  const [dose, setDose] = React.useState('7.5');
  const [startWeight, setStartWeight] = React.useState('');
  const [goalWeight, setGoalWeight] = React.useState('');
  const [scheduleInterval, setScheduleInterval] = React.useState(7);
  const [firstShotDate, setFirstShotDate] = React.useState(
    new Date().toISOString().slice(0,10)
  );

  const inp = (placeholder, value, onChange, type='text') => (
    <input
      type={type}
      placeholder={placeholder}
      value={value}
      onChange={e => onChange(e.target.value)}
      style={{
        width:'100%', padding:'14px 16px',
        background:p.bgInset, border:`0.5px solid ${p.line}`,
        borderRadius:R.md, fontFamily:TYPE.ui, fontSize:16,
        color:p.ink, outline:'none', appearance:'none',
      }}
    />
  );

  const steps = [
    {
      title: <><span style={{fontStyle:'italic',color:p.accent}}>Welcome</span> to Vital</>,
      sub: 'Your private GLP-1 tracker. All data stays on your device.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft, marginBottom:4 }}>
            What should we call you?
          </div>
          {inp('Your first name', name, setName)}
        </div>
      ),
      canAdvance: name.trim().length > 0,
    },
    {
      title: <>Your <span style={{fontStyle:'italic',color:p.accent}}>medication</span></>,
      sub: 'We use this to calculate drug levels using your FDA pharmacokinetic profile.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {Object.entries(MEDS_DB).map(([key, med]) => (
            <button key={key} onClick={() => setMedKey(key)} style={{
              padding:'14px 16px', borderRadius:R.md, textAlign:'left',
              background: medKey===key ? p.primarySoft : p.bgElev,
              border:`0.5px solid ${medKey===key ? p.primary : p.line}`,
              cursor:'pointer', display:'flex', alignItems:'center', gap:12,
            }}>
              <div style={{
                width:8, height:8, borderRadius:4,
                background: medKey===key ? p.primary : p.line,
                flexShrink:0,
              }}/>
              <div>
                <div style={{ fontFamily:TYPE.ui, fontSize:14, color:p.ink, fontWeight:500 }}>
                  {med.name}
                </div>
                {med.brand && (
                  <div style={{ fontFamily:TYPE.ui, fontSize:11, color:p.inkMuted, marginTop:2 }}>
                    {med.brand}
                  </div>
                )}
              </div>
            </button>
          ))}
        </div>
      ),
      canAdvance: true,
    },
    {
      title: <>Current <span style={{fontStyle:'italic',color:p.accent}}>dose</span></>,
      sub: 'Your most recent injection dose.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {[2.5,5,7.5,10,12.5,15].map(d => (
              <button key={d} onClick={() => setDose(String(d))} style={{
                flex:'1 1 70px', padding:'18px 8px',
                borderRadius:R.md,
                background: dose===String(d) ? p.ink : p.bgElev,
                color: dose===String(d) ? p.bgElev : p.ink,
                border:`0.5px solid ${dose===String(d) ? 'transparent' : p.line}`,
                fontFamily:TYPE.display, fontSize:20, cursor:'pointer',
              }}>{d}</button>
            ))}
          </div>
          <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft }}>
            Weekly schedule every{' '}
            {[7,14].map(n => (
              <button key={n} onClick={() => setScheduleInterval(n)} style={{
                margin:'0 4px',
                padding:'4px 10px', borderRadius:R.pill,
                background: scheduleInterval===n ? p.primary : p.bgInset,
                color: scheduleInterval===n ? p.primaryInk : p.ink,
                border:'none', cursor:'pointer',
                fontFamily:TYPE.ui, fontSize:12, fontWeight:500,
              }}>{n} days</button>
            ))}
          </div>
        </div>
      ),
      canAdvance: parseFloat(dose) > 0,
    },
    {
      title: <>When was your <span style={{fontStyle:'italic',color:p.accent}}>last shot?</span></>,
      sub: 'We\'ll use this to calculate your current drug level right now.',
      content: (
        <div>
          <input
            type="date"
            value={firstShotDate}
            max={new Date().toISOString().slice(0,10)}
            onChange={e => setFirstShotDate(e.target.value)}
            style={{
              width:'100%', padding:'14px 16px',
              background:p.bgInset, border:`0.5px solid ${p.line}`,
              borderRadius:R.md, fontFamily:TYPE.ui, fontSize:16,
              color:p.ink, outline:'none',
            }}
          />
        </div>
      ),
      canAdvance: !!firstShotDate,
    },
    {
      title: <>Your weight <span style={{fontStyle:'italic',color:p.accent}}>goal</span></>,
      sub: 'Optional — helps track progress and project your goal date.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {inp('Starting weight (lbs)', startWeight, setStartWeight, 'number')}
          {inp('Goal weight (lbs)', goalWeight, setGoalWeight, 'number')}
          <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkMuted }}>
            You can always skip this and set it later in Settings.
          </div>
        </div>
      ),
      canAdvance: true,
    },
  ];

  const curr = steps[step];

  function handleFinish() {
    const med = MEDS_DB[medKey];
    const medId = `med_${Date.now()}`;
    const now = new Date();
    const shotDate = new Date(firstShotDate);
    // set time to 8am if date is today, otherwise noon
    const isToday = firstShotDate === now.toISOString().slice(0,10);
    shotDate.setHours(isToday ? now.getHours() : 9, isToday ? now.getMinutes() : 0, 0, 0);

    const store = {
      ...emptyStore(),
      palette: 'cream',
      meds: [{
        id: medId,
        name: med.name,
        brand: med.brand,
        halfLifeDays: med.halfLifeDays,
        tmaxDays: med.tmaxDays,
        currentDose: parseFloat(dose),
        unit: 'mg',
        scheduleIntervalDays: scheduleInterval,
        startedDate: firstShotDate,
      }],
      shots: [{
        id: `shot_${Date.now()}`,
        medId,
        dose: parseFloat(dose),
        unit: 'mg',
        date: shotDate.toISOString(),
        site: 'L. Abdomen',
        notes: 'First logged shot',
        weight: startWeight ? parseFloat(startWeight) : null,
      }],
      weights: startWeight ? [{
        id: `wt_${Date.now()}`,
        weight: parseFloat(startWeight),
        date: firstShotDate,
        notes: 'Starting weight',
      }] : [],
      startWeight: startWeight ? parseFloat(startWeight) : null,
      goalWeight: goalWeight ? parseFloat(goalWeight) : null,
      startDate: firstShotDate,
      userName: name.trim(),
    };
    saveStore(store);
    onComplete(store);
  }

  return (
    <div style={{
      position:'absolute', inset:0,
      background:p.bg, fontFamily:TYPE.ui, color:p.ink,
      display:'flex', flexDirection:'column',
      paddingTop:'max(60px, env(safe-area-inset-top))',
    }}>
      {/* Progress bar */}
      <div style={{ padding:'0 22px 24px' }}>
        <div style={{ display:'flex', gap:4 }}>
          {steps.map((_,i) => (
            <div key={i} style={{
              flex:1, height:3, borderRadius:2,
              background: i <= step ? p.primary : p.bgInset,
              transition:'background 0.3s',
            }}/>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 22px' }}>
        <div style={{ fontFamily:TYPE.display, fontSize:36, color:p.ink, letterSpacing:'-0.025em', lineHeight:1.05, marginBottom:8 }}>
          {curr.title}
        </div>
        <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft, lineHeight:1.5, marginBottom:32 }}>
          {curr.sub}
        </div>
        {curr.content}
      </div>

      {/* Nav */}
      <div style={{
        padding:'16px 22px max(28px, env(safe-area-inset-bottom))',
        borderTop:`0.5px solid ${p.line}`,
        display:'flex', gap:10,
      }}>
        {step > 0 && (
          <PillBtn p={p} kind="ghost" onClick={() => setStep(s=>s-1)} style={{ flex:0 }}>
            Back
          </PillBtn>
        )}
        <PillBtn
          p={p} kind="primary"
          disabled={!curr.canAdvance}
          onClick={() => {
            if (step < steps.length - 1) setStep(s=>s+1);
            else handleFinish();
          }}
          style={{ flex:1 }}
        >
          {step === steps.length - 1 ? 'Start tracking' : 'Continue'}
        </PillBtn>
      </div>
    </div>
  );
}

Object.assign(window, { Onboarding });
  </script>

  <!-- ════════════════════════════════════════════════════
       SCREEN: TODAY
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function ScreenToday({ p, store, onLogShot, onGoTab }) {
  const NOW = Date.now();
  const level = getCurrentLevel(store, NOW);
  const peak  = getPeakLevel(store);
  const next  = nextShotDate(store, NOW);
  const dleft = next ? daysUntil(next, NOW) : null;
  const todayLabel = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  const wts = store.weights;
  const todayW = wts.length ? wts[wts.length-1].weight : null;
  const weekAgo = wts.length > 8 ? wts[Math.max(0,wts.length-8)].weight : (wts.length ? wts[0].weight : null);
  const wkDelta = todayW && weekAgo ? +(todayW - weekAgo).toFixed(1) : null;
  const totalLost = store.startWeight && todayW ? +(store.startWeight - todayW).toFixed(1) : null;

  const med = store.meds[0];

  return (
    <div style={{ padding:'8px 0 110px', fontFamily:TYPE.ui, color:p.ink, background:p.bg, minHeight:'100%' }}>
      {/* Greeting */}
      <div style={{ padding:'0 22px 4px' }}>
        <Eyebrow p={p}>{todayLabel}</Eyebrow>
      </div>
      <div style={{ padding:'0 22px 24px', display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:12 }}>
        <div style={{
          fontFamily:TYPE.display, fontSize:36, color:p.ink,
          lineHeight:0.95, letterSpacing:'-0.025em',
        }}>
          Hi, {store.userName || 'there'}<span style={{ fontStyle:'italic', color:p.accent }}>.</span>
        </div>
      </div>

      {/* HERO drug level */}
      {med ? (
        <div style={{ padding:'0 16px 14px' }}>
          <Card p={p} dark ink={p.primary} padding={0} style={{ overflow:'hidden', position:'relative' }}>
            <div style={{
              position:'absolute', inset:0, opacity:0.08, pointerEvents:'none',
              background:`radial-gradient(circle at 80% 20%, ${p.bgElev} 0%, transparent 50%)`,
            }}/>
            <div style={{ display:'flex', padding:'22px 22px 18px', gap:16, position:'relative' }}>
              <Ring size={130} stroke={11} value={level} max={Math.max(peak*1.1, level+0.1)}
                color={p.bgElev} track={`${p.bgElev}22`} p={p}>
                <div style={{ textAlign:'center', color:p.bgElev }}>
                  <div style={{ fontFamily:TYPE.display, fontSize:34, lineHeight:0.9, letterSpacing:'-0.03em', color:p.bgElev }}>
                    {level.toFixed(2)}
                  </div>
                  <div style={{ fontFamily:TYPE.ui, fontSize:9, opacity:0.7, marginTop:2, letterSpacing:'0.06em' }}>MG ACTIVE</div>
                </div>
              </Ring>
              <div style={{ flex:1, color:p.bgElev, display:'flex', flexDirection:'column', justifyContent:'space-between', minWidth:0 }}>
                <div>
                  <div style={{ fontFamily:TYPE.mono, fontSize:9, opacity:0.6, letterSpacing:'0.14em' }}>IN YOUR SYSTEM</div>
                  <div style={{ fontFamily:TYPE.display, fontSize:22, marginTop:2, fontStyle:'italic', lineHeight:1.1 }}>{med.name}</div>
                  <div style={{ fontFamily:TYPE.ui, fontSize:12, opacity:0.7, marginTop:2 }}>
                    {med.currentDose}mg · every {med.scheduleIntervalDays||7}d
                  </div>
                </div>
                {next && (
                  <div style={{ marginTop:16 }}>
                    <div style={{ fontFamily:TYPE.mono, fontSize:9, opacity:0.6, letterSpacing:'0.14em', marginBottom:4 }}>NEXT SHOT</div>
                    <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
                      <span style={{ fontFamily:TYPE.display, fontSize:28 }}>
                        {dleft === 0 ? 'Today' : dleft === 1 ? '1 day' : `${dleft}d`}
                      </span>
                      <span style={{ fontFamily:TYPE.ui, fontSize:11, opacity:0.7 }}>
                        {dleft !== 0 && fmtDate(next, {weekday:'short',month:'short',day:'numeric'})}
                      </span>
                    </div>
                    {dleft <= 0 && (
                      <div style={{
                        marginTop:8, display:'inline-flex', alignItems:'center', gap:6,
                        padding:'5px 10px', borderRadius:R.pill,
                        background:`${p.warn}25`, color:p.warn,
                        fontFamily:TYPE.mono, fontSize:10, fontWeight:600, letterSpacing:'0.08em',
                      }}>
                        ⏰ Shot due
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
            <div style={{ padding:'0 22px 18px', borderTop:`0.5px solid ${p.bgElev}18` }}>
              <button onClick={onLogShot} style={{
                width:'100%', padding:'12px', borderRadius:R.pill,
                background:`${p.bgElev}15`,
                border:`0.5px solid ${p.bgElev}30`,
                color:p.bgElev, fontFamily:TYPE.ui, fontSize:13, fontWeight:500,
                cursor:'pointer', letterSpacing:'0.02em',
                display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              }}>
                <Icons.Plus size={14} color={p.bgElev}/> Log a shot
              </button>
            </div>
          </Card>
        </div>
      ) : (
        <div style={{ padding:'0 16px 14px' }}>
          <Card p={p} padding={24} style={{ textAlign:'center' }}>
            <div style={{ fontFamily:TYPE.display, fontSize:24, marginBottom:8 }}>No medication set up</div>
            <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft }}>Go to Settings to add your medication.</div>

      {/* Weight glance */}
      {todayW && (

                  <span style={{ fontFamily:TYPE.display, fontSize:36, color:p.ink, letterSpacing:'-0.025em', lineHeight:0.9 }}>

                  </span>
                  <span style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft }}>lbs</span>
                  {wkDelta !== null && <Delta value={wkDelta} unit=" lbs" p={p} invert style={{ fontSize:12 }}/>}
                </div>
                {totalLost !== null && totalLost > 0 && (
                  <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.success, marginTop:4 }}>
                    ↓ {totalLost} lbs total lost
                  </div>
                )}
              </div>
              <button onClick={() => onGoTab('weight')} style={{
                background:'none', border:'none', cursor:'pointer', color:p.inkMuted, padding:4,
              }}>
                <Icons.ChevRight size={18} color={p.inkMuted}/>
              </button>
            </div>
          </Card>
        </div>
      )}

      {/* Recent shots */}
      {store.shots.length > 0 && (
        <>
          <div style={{ padding:'8px 22px 8px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
            <Eyebrow p={p}>Recent shots</Eyebrow>
            <button onClick={() => onGoTab('levels')} style={{

                  padding:'14px 18px',
                  borderBottom: i===arr.length-1?'none':`0.5px solid ${p.lineSoft}`,

                    background:p.primarySoft, color:p.primary,
                    display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,

                    <Icons.Pill size={16} color={p.primary}/>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.ink, fontWeight:500 }}>
                      {s.dose}{s.unit} · {s.site}
                    </div>
                    <div style={{ fontFamily:TYPE.mono, fontSize:10, color:p.inkMuted, letterSpacing:'0.05em', marginTop:2 }}>
                      {fmtDate(s.date, {weekday:'short',month:'short',day:'numeric'}).toUpperCase()}
                    </div>
                  </div>
                  <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft }}>
                    {Math.max(0,Math.ceil((NOW - new Date(s.date))/86400000))}d ago
                  </div>
                </div>
              ))}
            </Card>
          </div>
        </>
      )}
    </div>
  );
}
Object.assign(window, { ScreenToday });
  </script>

  <!-- ════════════════════════════════════════════════════
       SCREEN: LEVELS
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function ScreenLevels({ p, store }) {
  const [range, setRange] = React.useState(28);
  const NOW = Date.now();
  const futureDays = 14;
  const W = 358, H = 200;
  const padL=8, padR=8, padT=12, padB=24;
  const plotW=W-padL-padR, plotH=H-padT-padB;

  const med = store.meds[0];
  const shots = med ? store.shots.filter(s=>s.medId===med.id).map(s=>({...s,dose:effectiveMg(s,med)})) : [];

  const pastDays = range;
  const totalDays = pastDays + futureDays;
  const steps = 80;
  const pts = [];
  for (let i=0; i<=steps; i++) {
    const t = NOW - pastDays*86400000 + (i/steps)*totalDays*86400000;
    const lvl = med ? totalDrugLevel(shots, med.halfLifeDays, med.tmaxDays, t) : 0;
    pts.push({ t, lvl });
  }
  const maxLvl = Math.max(...pts.map(p=>p.lvl), 0.1) * 1.15;
  const xOf = t => padL + ((t-(NOW-pastDays*86400000))/(totalDays*86400000))*plotW;
  const yOf = v => padT + plotH - (v/maxLvl)*plotH;

  const linePath = pts.map((pt,i)=>`${i===0?'M':'L'} ${xOf(pt.t).toFixed(2)} ${yOf(pt.lvl).toFixed(2)}`).join(' ');
  const areaPath = linePath + ` L ${xOf(pts[pts.length-1].t).toFixed(2)} ${padT+plotH} L ${xOf(pts[0].t).toFixed(2)} ${padT+plotH} Z`;
  const nowX = xOf(NOW);

  const recentShots = store.shots.filter(s=>{
    const t=new Date(s.date).getTime();
    return t>=NOW-pastDays*86400000 && t<=NOW+futureDays*86400000;
  });

  const currentLvl = getCurrentLevel(store, NOW);
  const next = nextShotDate(store, NOW);
  const trough = next && med ? totalDrugLevel(shots, med.halfLifeDays, med.tmaxDays, next.getTime()-60000) : 0;
  const peakInCycle = Math.max(...pts.slice(steps-Math.floor(steps*7/totalDays)).map(p=>p.lvl), 0);

  const xLabels = [];
  for (let d=-pastDays; d<=futureDays; d+=Math.ceil(totalDays/6)) {
    xLabels.push({ x:xOf(NOW+d*86400000), label:d===0?'Now':d<0?`${d}d`:`+${d}d`, isNow:d===0 });
  }

  if (!med) return (
    <div style={{ padding:'40px 22px', fontFamily:TYPE.ui, color:p.inkSoft, textAlign:'center' }}>
      <div style={{ fontFamily:TYPE.display, fontSize:28, color:p.ink, marginBottom:8 }}>No medication</div>
      Set up your medication in Settings to see your drug level forecast.
    </div>
  );

  return (
    <div style={{ padding:'8px 0 110px', fontFamily:TYPE.ui, background:p.bg, minHeight:'100%' }}>
      <ScreenHeader p={p}
        eyebrow="Pharmacokinetics"
        title={<>Drug <span style={{fontStyle:'italic'}}>at work</span></>}
        sub={`How much ${med.name} is active in your system.`}
      />
      <div style={{ padding:'0 16px 14px' }}>
        <Card p={p} padding={0} style={{ overflow:'hidden' }}>
          <div style={{ padding:'20px 22px 12px', display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
            <div>
              <Eyebrow p={p}>Active right now</Eyebrow>
              <div style={{ display:'flex', alignItems:'baseline', gap:6, marginTop:4 }}>
                <span style={{ fontFamily:TYPE.display, fontSize:52, color:p.ink, lineHeight:0.9, letterSpacing:'-0.03em' }}>
                  {currentLvl.toFixed(2)}
                </span>
                <span style={{ fontFamily:TYPE.ui, fontSize:14, color:p.inkSoft }}>mg</span>
              </div>
              <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft, marginTop:4 }}>
                {med.name} · {med.currentDose}mg cycle
              </div>
            </div>
          </div>
          <div style={{ padding:'0 22px 8px', display:'flex', gap:6, flexWrap:'wrap' }}>
            {[14,28,60].map(d => (
              <Chip key={d} p={p} active={range===d} onClick={()=>setRange(d)}>
                {d===60?'All':`${d} days`}
              </Chip>
            ))}
          </div>
          <div style={{ padding:'0 14px 8px' }}>
            <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`}>
              <defs>
                <linearGradient id="lvlFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={p.primary} stopOpacity="0.22"/>
                  <stop offset="100%" stopColor={p.primary} stopOpacity="0"/>
                </linearGradient>
                <pattern id="dashFut" patternUnits="userSpaceOnUse" width="6" height="6">
                  <line x1="0" y1="0" x2="6" y2="6" stroke={p.line} strokeWidth="0.5"/>
                </pattern>
              </defs>
              {[0.25,0.5,0.75].map((g,i)=>(
                <line key={i} x1={padL} x2={W-padR}
                  y1={padT+plotH*g} y2={padT+plotH*g}
                  stroke={p.chartGrid} strokeWidth="0.5" strokeDasharray="3 4"/>
              ))}
              <rect x={nowX} y={padT} width={W-padR-nowX} height={plotH} fill="url(#dashFut)"/>
              <path d={areaPath} fill="url(#lvlFill)"/>
              <path d={linePath} stroke={p.primary} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
              <line x1={nowX} x2={nowX} y1={padT-4} y2={padT+plotH} stroke={p.accent} strokeWidth="1" strokeDasharray="2 3"/>
              <circle cx={nowX} cy={yOf(currentLvl)} r="5" fill={p.accent}/>
              <circle cx={nowX} cy={yOf(currentLvl)} r="9" fill={p.accent} fillOpacity="0.18"/>
              <g transform={`translate(${nowX},${padT-8})`}>
                <rect x="-22" y="-14" width="44" height="14" rx="7" fill={p.accent}/>
                <text x="0" y="-3" fill="#fff" textAnchor="middle"
                  style={{ fontFamily:TYPE.mono, fontSize:9, fontWeight:600, letterSpacing:'0.1em' }}>NOW</text>
              </g>
              {recentShots.map(s=>{
                const sx = xOf(new Date(s.date).getTime());
                return (
                  <g key={s.id}>
                    <line x1={sx} x2={sx} y1={padT+plotH-4} y2={padT+plotH+4} stroke={p.primary} strokeWidth="1.2"/>
                    <circle cx={sx} cy={padT+plotH+8} r="2" fill={p.primary}/>
                  </g>
                );
              })}
              {xLabels.map((l,i)=>(
                <text key={i} x={l.x} y={H-4} textAnchor="middle"
                  fill={l.isNow?p.accent:p.inkMuted}
                  style={{ fontFamily:TYPE.mono, fontSize:9, fontWeight:l.isNow?600:400, letterSpacing:'0.08em' }}>
                  {l.label.toUpperCase()}
                </text>
              ))}
            </svg>
          </div>
        </Card>
      </div>
      <div style={{ padding:'0 16px 14px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
        {[
          { label:'Peak', v:peakInCycle.toFixed(2), unit:'mg', sub:'this cycle', color:p.primary },
          { label:'Trough', v:trough.toFixed(2), unit:'mg', sub:'end of week', color:p.weight },
          { label:'Half-life', v:med.halfLifeDays, unit:'d', sub:med.name.split(' ')[0], color:p.accent },
        ].map(t=>(
          <div key={t.label} style={{
            background:p.bgElev, border:`0.5px solid ${p.line}`,
            borderRadius:R.lg, padding:'14px',
          }}>
            <Eyebrow p={p} style={{marginBottom:6}}>{t.label}</Eyebrow>
            <div style={{ display:'flex', alignItems:'baseline', gap:3 }}>
              <span style={{ fontFamily:TYPE.display, fontSize:26, color:t.color, lineHeight:0.95, letterSpacing:'-0.025em' }}>{t.v}</span>
              <span style={{ fontFamily:TYPE.ui, fontSize:11, color:p.inkSoft }}>{t.unit}</span>
            </div>
            <div style={{ fontFamily:TYPE.ui, fontSize:11, color:p.inkMuted, marginTop:4 }}>{t.sub}</div>
          </div>
        ))}
      </div>
      {store.shots.length > 0 && (
        <>
          <div style={{ padding:'8px 22px 8px' }}>
            <Eyebrow p={p}>Shot history</Eyebrow>
          </div>
          <div style={{ padding:'0 16px 16px' }}>
            <Card p={p} padding={0}>
              {[...store.shots].slice(-5).reverse().map((s,i,arr)=>(
                <div key={s.id} style={{
                  display:'flex', alignItems:'center', gap:12, padding:'14px 18px',
                  borderBottom:i===arr.length-1?'none':`0.5px solid ${p.lineSoft}`,
                }}>
                  <div style={{
                    width:36,height:36,borderRadius:18,
                    background:p.primarySoft,color:p.primary,
                    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                  }}><Icons.Pill size={16} color={p.primary}/></div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>
                      {s.dose}{s.unit} · {s.site}
                    </div>
                    <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.05em',marginTop:2}}>
                      {fmtDate(s.date,{weekday:'short',month:'short',day:'numeric'}).toUpperCase()}
                    </div>
                  </div>
                  <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>
                    {Math.max(0,Math.ceil((NOW-new Date(s.date))/86400000))}d ago
                  </div>
                </div>
              ))}
            </Card>
          </div>
        </>
      )}
    </div>
  );
}
Object.assign(window, { ScreenLevels });
  </script>

  <!-- ════════════════════════════════════════════════════
       SCREEN: WEIGHT
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function ScreenWeight({ p, store, onUpdate }) {
  const NOW = Date.now();
  const [newWeight, setNewWeight] = React.useState('');
  const [newWeightNote, setNewWeightNote] = React.useState('');
  const [addingWeight, setAddingWeight] = React.useState(false);

  const wts = store.weights || [];
  const current = wts.length ? wts[wts.length-1].weight : null;
  const start = store.startWeight;
  const goal = store.goalWeight;
  const totalLost = start && current ? +(start-current).toFixed(1) : null;
  const toGo = goal && current ? +(current-goal).toFixed(1) : null;
  const pct = start && goal && current ? Math.min(100,Math.round(((start-current)/(start-goal))*100)) : 0;

  // pace
  const fourWeeksIdx = Math.max(0, wts.length-15);
  const fourWeeksAgo = wts.length > 1 ? wts[fourWeeksIdx].weight : null;
  const pace = fourWeeksAgo && current ? +((fourWeeksAgo-current)/4).toFixed(2) : null;
  const weeksToGoal = pace && pace > 0 && toGo ? Math.ceil(toGo/pace) : null;
  const goalDate = weeksToGoal ? new Date(NOW+weeksToGoal*7*86400000) : null;

  function logWeight() {
    const w = parseFloat(newWeight);
    if (isNaN(w) || w < 50 || w > 700) return;
    const updated = {
      ...store,
      weights: [...wts, {
        id:`wt_${Date.now()}`,
        weight:w,
        date:new Date().toISOString().slice(0,10),
        notes:newWeightNote,
      }],
    };
    saveStore(updated);
    onUpdate(updated);
    setNewWeight('');
    setNewWeightNote('');
    setAddingWeight(false);
  }

  // Chart
  const W=358, H=160, padL=14, padR=14, padT=14, padB=28, plotW=W-padL-padR, plotH=H-padT-padB;
  const allW = wts.map(w=>w.weight);
  const wMin = (goal ? Math.min(...allW,goal) : Math.min(...allW)) - 2;
  const wMax = (start ? Math.max(...allW,start) : Math.max(...allW)) + 2;
  const wRange = (wMax-wMin)||1;
  const xH = i => padL+(i/(wts.length-1||1))*plotW;
  const yH = v => padT+plotH-((v-wMin)/wRange)*plotH;
  const linePath = wts.length>1 ? wts.map((w,i)=>`${i===0?'M':'L'} ${xH(i).toFixed(1)} ${yH(w.weight).toFixed(1)}`).join(' ') : '';
  const areaPath = linePath ? linePath+` L ${xH(wts.length-1)} ${padT+plotH} L ${padL} ${padT+plotH} Z` : '';

  return (
    <div style={{ padding:'8px 0 110px', fontFamily:TYPE.ui, background:p.bg, minHeight:'100%' }}>
      <ScreenHeader p={p}
        eyebrow="Body weight"
        title={totalLost && totalLost>0
          ? <span>Down <span style={{fontStyle:'italic',color:p.accent}}>{totalLost}</span> lbs</span>
          : <span style={{fontStyle:'italic'}}>Weight</span>
        }
        sub={start && store.startDate
          ? `Since ${fmtDate(store.startDate,{month:'long',day:'numeric'})} · ${Math.round((NOW-new Date(store.startDate))/(86400000*7))} weeks in`
          : 'Track your progress'}
        action={
          <button onClick={()=>setAddingWeight(a=>!a)} style={{
            display:'flex', alignItems:'center', gap:6,
            padding:'8px 14px', borderRadius:R.pill,
            background:addingWeight?p.primarySoft:p.bgInset,
            color:addingWeight?p.primary:p.ink,
            border:`0.5px solid ${addingWeight?p.primary:p.line}`,
            fontFamily:TYPE.ui, fontSize:12, fontWeight:500,
            cursor:'pointer',
          }}>
            <Icons.Plus size={14}/> Log
          </button>
        }
      />

      {/* Add weight panel */}
      {addingWeight && (
        <div style={{ padding:'0 16px 14px' }}>
          <Card p={p} padding={18}>
            <Eyebrow p={p} style={{marginBottom:12}}>Log today's weight</Eyebrow>
            <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:10 }}>
              <input
                type="number"
                placeholder="Weight (lbs)"
                value={newWeight}
                onChange={e=>setNewWeight(e.target.value)}
                style={{
                  flex:1, padding:'12px 14px', borderRadius:R.md,
                  background:p.bgInset, border:`0.5px solid ${p.line}`,
                  fontFamily:TYPE.ui, fontSize:16, color:p.ink, outline:'none',
                }}
              />
              <PillBtn p={p} kind="primary" onClick={logWeight} disabled={!newWeight}>Save</PillBtn>
            </div>
          </Card>
        </div>
      )}

      {/* Progress arc */}
      {(start && goal && current) && (
        <div style={{ padding:'0 16px 14px' }}>
          <Card p={p} padding={18}>
            <div style={{ display:'flex', alignItems:'center', gap:20 }}>
              <Ring size={100} stroke={10} value={pct} max={100} color={p.weight} track={p.weightSoft} p={p}>
                <div style={{ textAlign:'center' }}>
                  <div style={{ fontFamily:TYPE.display, fontSize:22, color:p.weight, lineHeight:0.9 }}>{pct}%</div>
                  <div style={{ fontFamily:TYPE.ui, fontSize:9, color:p.inkMuted, marginTop:2 }}>to goal</div>
                </div>
              </Ring>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:TYPE.display, fontSize:40, color:p.ink, lineHeight:0.9, letterSpacing:'-0.02em' }}>
                  {current}
                </div>
                <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft, marginTop:4 }}>lbs current</div>
                <div style={{ display:'flex', gap:16, marginTop:10 }}>
                  <div>
                    <div style={{ fontFamily:TYPE.mono, fontSize:9, color:p.inkMuted, letterSpacing:'0.1em' }}>GOAL</div>
                    <div style={{ fontFamily:TYPE.ui, fontSize:14, color:p.ink, fontWeight:500 }}>{goal} lbs</div>
                  </div>
                  {toGo > 0 && (
                    <div>
                      <div style={{ fontFamily:TYPE.mono, fontSize:9, color:p.inkMuted, letterSpacing:'0.1em' }}>TO GO</div>
                      <div style={{ fontFamily:TYPE.ui, fontSize:14, color:p.ink, fontWeight:500 }}>{toGo} lbs</div>
                    </div>
                  )}
                </div>
                {goalDate && toGo > 0 && (
                  <div style={{ fontFamily:TYPE.ui, fontSize:11, color:p.success, marginTop:6 }}>
                    Projected: {fmtDate(goalDate,{month:'short',year:'numeric'})} at current pace
                  </div>
                )}
              </div>
            </div>
          </Card>
        </div>
      )}

      {/* Chart */}
      {wts.length > 1 && (
        <div style={{ padding:'0 16px 14px' }}>
          <Card p={p} padding={0} style={{ overflow:'hidden' }}>
            <div style={{ padding:'16px 18px 8px' }}>
              <Eyebrow p={p} style={{marginBottom:4}}>Trend</Eyebrow>
            </div>
            <div style={{ padding:'0 14px 8px' }}>
              <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`}>
                <defs>
                  <linearGradient id="wtFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={p.weight} stopOpacity="0.18"/>
                    <stop offset="100%" stopColor={p.weight} stopOpacity="0"/>
                  </linearGradient>
                </defs>
                {goal && <line x1={padL} x2={W-padR} y1={yH(goal)} y2={yH(goal)}
                  stroke={p.success} strokeWidth="1" strokeDasharray="4 4"/>}
                {wts.length>1 && <path d={areaPath} fill="url(#wtFill)"/>}
                {wts.length>1 && <path d={linePath} stroke={p.weight} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>}
                {wts.length>0 && (
                  <circle cx={xH(wts.length-1)} cy={yH(current)} r="5" fill={p.weight} stroke={p.bgElev} strokeWidth="2"/>
                )}
              </svg>
            </div>
          </Card>
        </div>
      )}

      {/* History */}
      {wts.length > 0 && (
        <>
          <div style={{ padding:'8px 22px 8px' }}>
            <Eyebrow p={p}>Recent entries</Eyebrow>
          </div>
          <div style={{ padding:'0 16px 16px' }}>
            <Card p={p} padding={0}>
              {[...wts].slice(-5).reverse().map((w,i,arr)=>(
                <div key={w.id} style={{
                  display:'flex', alignItems:'center', gap:12, padding:'14px 18px',
                  borderBottom:i===arr.length-1?'none':`0.5px solid ${p.lineSoft}`,
                }}>
                  <div style={{
                    width:36,height:36,borderRadius:18,
                    background:p.weightSoft,color:p.weight,
                    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                  }}><Icons.Weight size={16} color={p.weight}/></div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:TYPE.display,fontSize:22,color:p.ink,letterSpacing:'-0.02em'}}>
                      {w.weight} <span style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft}}>lbs</span>
                    </div>
                    <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginTop:2}}>
                      {fmtDate(w.date,{weekday:'short',month:'short',day:'numeric'}).toUpperCase()}
                    </div>
                  </div>
                </div>
              ))}
            </Card>
          </div>
        </>
      )}
    </div>
  );
}
Object.assign(window, { ScreenWeight });
  </script>

  <!-- ════════════════════════════════════════════════════
       SCREEN: LOG SHOT
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function ScreenLog({ p, store, onClose, onSave }) {
  const NOW = Date.now();
  const med = store.meds[0];
  const [dose, setDose] = React.useState(med?.currentDose || 7.5);
  const [site, setSite] = React.useState('L. Abdomen');
  const [feeling, setFeeling] = React.useState(2);
  const [logWeight, setLogWeight] = React.useState(false);
  const [weight, setWeight] = React.useState('');

  const allSites = ['L. Abdomen','R. Abdomen','L. Thigh','R. Thigh','L. Arm','R. Arm'];
  const recentSites = store.shots.slice(-6).map(s=>s.site);
  const siteCount = s => recentSites.filter(r=>r===s).length;
  const suggestedSite = allSites.reduce((min,s)=>siteCount(s)<siteCount(min)?s:min, 'L. Abdomen');

  const moods = ['😣','😕','😐','🙂','😀'];
  const moodLabels = ['Rough','Off','OK','Good','Great'];
  const doses = [2.5,5,7.5,10,12.5,15];

  function handleSave() {
    if (!med) return;
    const shotId = `shot_${Date.now()}`;
    const now = new Date();
    const newShot = {
      id: shotId, medId:med.id,
      dose, unit:'mg',
      date: now.toISOString(),
      site, notes:`Feeling: ${moodLabels[feeling]}`,
      weight: logWeight && weight ? parseFloat(weight) : null,
    };
    const newStore = {
      ...store,
      shots: [...store.shots, newShot],
      weights: logWeight && weight
        ? [...store.weights, { id:`wt_${Date.now()}`, weight:parseFloat(weight), date:now.toISOString().slice(0,10), notes:'Logged with shot' }]
        : store.weights,
    };
    // Update med's current dose
    newStore.meds = store.meds.map(m => m.id===med.id ? {...m, currentDose:dose} : m);
    saveStore(newStore);
    onSave(newStore);
  }

  return (
    <div style={{
      position:'absolute', inset:0, background:p.bg,
      display:'flex', flexDirection:'column', zIndex:200,
      fontFamily:TYPE.ui, color:p.ink,
    }}>
      <div style={{
        padding:'12px 22px 4px',
        paddingTop:'max(12px, env(safe-area-inset-top))',
        display:'flex', flexDirection:'column', alignItems:'center', gap:12,
      }}>
        <div style={{ width:40, height:4, borderRadius:2, background:p.line }}/>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%' }}>
          <button onClick={onClose} style={{
            background:'none', border:'none', color:p.inkSoft,
            fontFamily:TYPE.ui, fontSize:14, cursor:'pointer', padding:4,
          }}>Cancel</button>
          <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft, fontWeight:500 }}>New injection</div>
          <div style={{ width:50 }}/>
        </div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'16px 22px 24px' }}>
        {/* Med name */}
        <div style={{ marginBottom:24 }}>
          <Eyebrow p={p}>Logging</Eyebrow>
          <div style={{ fontFamily:TYPE.display, fontSize:34, color:p.ink, letterSpacing:'-0.025em', lineHeight:0.95, marginTop:6 }}>
            {med?.name || 'Injection'}
          </div>
          <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft, marginTop:4 }}>
            {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} · {new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
          </div>
        </div>

        {/* Dose */}
        <div style={{ marginBottom:28 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <Eyebrow p={p}>Dose</Eyebrow>
            <span style={{ fontFamily:TYPE.display, fontSize:28, color:p.ink, letterSpacing:'-0.025em' }}>
              {dose}<span style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft, marginLeft:4 }}>mg</span>
            </span>
          </div>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            {doses.map(d=>(
              <button key={d} onClick={()=>setDose(d)} style={{
                flex:'1 1 60px', padding:'14px 8px', borderRadius:R.md,
                background:dose===d?p.ink:p.bgElev,
                color:dose===d?p.bgElev:p.ink,
                border:`0.5px solid ${dose===d?'transparent':p.line}`,
                fontFamily:TYPE.display, fontSize:18, cursor:'pointer',
              }}>{d}</button>
            ))}
          </div>
        </div>

        {/* Site */}
        <div style={{ marginBottom:28 }}>
          <Eyebrow p={p} style={{marginBottom:12}}>Injection site</Eyebrow>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {allSites.map(s=>(
              <button key={s} onClick={()=>setSite(s)} style={{
                padding:'8px 14px', borderRadius:R.pill,
                background:site===s?p.ink:siteCount(s)>=2?p.accentSoft:p.bgElev,
                color:site===s?p.bgElev:siteCount(s)>=2?p.accent:p.ink,
                border:`0.5px solid ${site===s?'transparent':p.line}`,
                fontFamily:TYPE.ui, fontSize:12, fontWeight:500, cursor:'pointer',
                whiteSpace:'nowrap',
              }}>
                {s} {siteCount(s)>0 && !`${site}`===s ? `(${siteCount(s)})` : ''}
              </button>
            ))}
          </div>
          {site !== suggestedSite && (
            <button onClick={()=>setSite(suggestedSite)} style={{
              marginTop:8, padding:'6px 12px', borderRadius:R.pill,
              background:p.accentSoft, color:p.accent,
              border:'none', fontFamily:TYPE.ui, fontSize:11, fontWeight:500,
              cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5,
            }}>
              <Icons.Wand size={12} color={p.accent}/> Suggest: {suggestedSite}
            </button>
          )}
        </div>

        {/* Feeling */}
        <div style={{ marginBottom:28 }}>
          <Eyebrow p={p} style={{marginBottom:12}}>Feeling right now</Eyebrow>
          <div style={{ display:'flex', gap:6 }}>
            {moods.map((m,i)=>(
              <button key={i} onClick={()=>setFeeling(i)} style={{
                flex:1, padding:'12px 4px', borderRadius:R.md,
                background:feeling===i?p.primarySoft:p.bgElev,
                border:`0.5px solid ${feeling===i?'transparent':p.line}`,
                cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:4,
              }}>
                <span style={{fontSize:22}}>{m}</span>
                <span style={{fontFamily:TYPE.ui,fontSize:10,color:feeling===i?p.primary:p.inkSoft,fontWeight:500}}>{moodLabels[i]}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Log weight toggle */}
        <button onClick={()=>setLogWeight(a=>!a)} style={{
          width:'100%', padding:'16px 18px', borderRadius:R.lg,
          background:logWeight?p.bgInset:p.bgElev,
          border:`0.5px solid ${p.line}`,
          display:'flex', alignItems:'center', gap:12, cursor:'pointer', textAlign:'left',
          marginBottom:logWeight?0:32,
        }}>
          <div style={{
            width:34,height:34,borderRadius:17,
            background:logWeight?p.weight:p.weightSoft, color:logWeight?p.bgElev:p.weight,
            display:'flex',alignItems:'center',justifyContent:'center',
          }}><Icons.Weight size={16} color="currentColor"/></div>
          <div style={{flex:1}}>
            <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>Also log today's weight</div>
            <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft,marginTop:2}}>Helps spot patterns with dose changes</div>
          </div>
          <div style={{
            width:44,height:26,borderRadius:13,
            background:logWeight?p.primary:p.line, position:'relative', transition:'background 0.2s',
          }}>
            <div style={{
              position:'absolute', top:3, left:logWeight?21:3,
              width:20,height:20,borderRadius:10,background:'#fff',transition:'left 0.2s',
            }}/>
          </div>
        </button>

        {logWeight && (
          <div style={{ padding:'14px 0 32px' }}>
            <input
              type="number"
              placeholder="Weight in lbs"
              value={weight}
              onChange={e=>setWeight(e.target.value)}
              style={{
                width:'100%', padding:'14px 16px', borderRadius:R.md,
                background:p.bgInset, border:`0.5px solid ${p.line}`,
                fontFamily:TYPE.ui, fontSize:16, color:p.ink, outline:'none',
              }}
            />
          </div>
        )}
      </div>

      <div style={{
        padding:'14px 22px',
        paddingBottom:'max(28px, env(safe-area-inset-bottom))',
        background:p.bg, borderTop:`0.5px solid ${p.line}`,
      }}>
        <PillBtn p={p} kind="primary" size="lg" onClick={handleSave}
          style={{ width:'100%' }} icon={<Icons.Check size={18} color={p.bgElev}/>}>
          Log {dose}mg shot
        </PillBtn>
      </div>
    </div>
  );
}
Object.assign(window, { ScreenLog });
  </script>

  <!-- ════════════════════════════════════════════════════
       SCREEN: SETTINGS
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function ScreenSettings({ p, store, onUpdate, onPaletteChange }) {
  const [showExport, setShowExport] = React.useState(false);
  const [importText, setImportText] = React.useState('');
  const [importError, setImportError] = React.useState('');

  function exportData() {
    const json = JSON.stringify(store, null, 2);
    const blob = new Blob([json], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'glp1-tracker-backup.json';
    a.click(); URL.revokeObjectURL(url);
  }

  function importData() {
    try {
      const parsed = JSON.parse(importText);
      if (!parsed.meds || !parsed.shots) throw new Error('Invalid format');
      saveStore(parsed);
      onUpdate(parsed);
      setImportText('');
      setImportError('');
    } catch(e) {
      setImportError('Invalid JSON. Please paste a valid backup.');
    }
  }

  const med = store.meds[0];

  function Row({ label, value, sub }) {
    return (
      <div style={{ padding:'14px 18px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.ink, fontWeight:500 }}>{label}</div>
          {sub && <div style={{ fontFamily:TYPE.ui, fontSize:11, color:p.inkSoft, marginTop:2 }}>{sub}</div>}
        </div>
        <div style={{ fontFamily:TYPE.ui, fontSize:13, color:p.inkSoft }}>{value}</div>
      </div>
    );
  }

  return (
    <div style={{ padding:'8px 0 110px', fontFamily:TYPE.ui, background:p.bg, minHeight:'100%' }}>
      <ScreenHeader p={p}
        eyebrow="Preferences"
        title={<span style={{fontStyle:'italic'}}>Settings</span>}
      />

      {/* Medication */}
      {med && (
        <>
          <div style={{ padding:'8px 22px 8px' }}>
            <Eyebrow p={p}>Medication</Eyebrow>
          </div>
          <div style={{ padding:'0 16px 14px' }}>
            <Card p={p} padding={0}>
              <Row label="Medication" value={med.name}/>
              <div style={{ height:'0.5px', background:p.lineSoft, margin:'0 18px' }}/>
              <Row label="Current dose" value={`${med.currentDose} ${med.unit}`}/>
              <div style={{ height:'0.5px', background:p.lineSoft, margin:'0 18px' }}/>
              <Row label="Schedule" value={`Every ${med.scheduleIntervalDays||7} days`}/>
              <div style={{ height:'0.5px', background:p.lineSoft, margin:'0 18px' }}/>
              <Row label="Half-life" value={`${med.halfLifeDays}d`} sub="PK model parameter"/>
            </Card>
          </div>
        </>
      )}

      {/* Goals */}
      <div style={{ padding:'8px 22px 8px' }}>
        <Eyebrow p={p}>Goals</Eyebrow>
      </div>
      <div style={{ padding:'0 16px 14px' }}>
        <Card p={p} padding={0}>
          <Row label="Start weight" value={store.startWeight ? `${store.startWeight} lbs` : 'Not set'}/>
          <div style={{ height:'0.5px', background:p.lineSoft, margin:'0 18px' }}/>
          <Row label="Goal weight" value={store.goalWeight ? `${store.goalWeight} lbs` : 'Not set'}/>
          <div style={{ height:'0.5px', background:p.lineSoft, margin:'0 18px' }}/>
          <Row label="Start date" value={store.startDate ? fmtDate(store.startDate,{month:'short',day:'numeric',year:'numeric'}) : 'Not set'}/>
        </Card>
      </div>

      {/* Theme */}
      <div style={{ padding:'8px 22px 8px' }}>
        <Eyebrow p={p}>Appearance</Eyebrow>
      </div>
      <div style={{ padding:'0 16px 14px' }}>
        <Card p={p} padding={14}>
          <div style={{ display:'flex', gap:8 }}>
            {Object.entries(PALETTES).map(([key, pal]) => (
              <button key={key} onClick={() => {
                const updated = {...store, palette:key};
                saveStore(updated); onUpdate(updated); onPaletteChange(key);
              }} style={{
                flex:1, padding:'12px 8px', borderRadius:R.md,
                background: store.palette===key ? p.primary : pal.bgElev,
                color: store.palette===key ? p.primaryInk : pal.ink,
                border:`1px solid ${store.palette===key ? p.primary : p.line}`,
                fontFamily:TYPE.ui, fontSize:12, fontWeight:500, cursor:'pointer',
              }}>
                {pal.name}
              </button>
            ))}
          </div>
        </Card>
      </div>

      {/* Data */}
      <div style={{ padding:'8px 22px 8px' }}>
        <Eyebrow p={p}>Data</Eyebrow>
      </div>
      <div style={{ padding:'0 16px 14px' }}>
        <Card p={p} padding={0}>
          <div style={{ padding:'4px 0' }}>
            <button onClick={exportData} style={{
              width:'100%', padding:'14px 18px', background:'none',
              border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:12, textAlign:'left',
            }}>
              <div style={{
                width:36,height:36,borderRadius:18,
                background:p.primarySoft, display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
              }}><Icons.Download size={16} color={p.primary}/></div>
              <div>
                <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>Export backup</div>
                <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft,marginTop:2}}>
                  {store.shots.length} shots · {store.weights.length} weights
                </div>
              </div>
            </button>
            <div style={{ height:'0.5px', background:p.lineSoft, margin:'0 18px' }}/>
            <button onClick={()=>setShowExport(a=>!a)} style={{
              width:'100%', padding:'14px 18px', background:'none',
              border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:12, textAlign:'left',
            }}>
              <div style={{
                width:36,height:36,borderRadius:18,
                background:p.bgInset, display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
              }}><Icons.Upload size={16} color={p.inkSoft}/></div>
              <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>Import backup</div>
            </button>
          </div>
        </Card>
        {showExport && (
          <div style={{ marginTop:10 }}>
            <textarea
              placeholder="Paste backup JSON here..."
              value={importText}
              onChange={e=>setImportText(e.target.value)}
              rows={4}
              style={{
                width:'100%', padding:'12px 14px', borderRadius:R.md,
                background:p.bgInset, border:`0.5px solid ${importError?p.accent:p.line}`,
                fontFamily:TYPE.mono, fontSize:12, color:p.ink, outline:'none', resize:'vertical',
              }}
            />
            {importError && <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.accent,marginTop:4}}>{importError}</div>}
            <PillBtn p={p} kind="primary" onClick={importData} disabled={!importText} style={{marginTop:8,width:'100%'}}>
              Import
            </PillBtn>
          </div>
        )}
      </div>

      {/* About */}
      <div style={{ padding:'0 16px 0' }}>
        <Card p={p} padding={14}>
          <div style={{ fontFamily:TYPE.ui, fontSize:12, color:p.inkSoft, lineHeight:1.6 }}>
            <strong style={{color:p.ink}}>Vital GLP-1 Tracker</strong> — All data stored locally in your browser. No accounts, no servers, no ads.
            <br/><br/>
            Drug levels are estimates using population pharmacokinetic data from FDA labels and clinical trials. Not a medical device. Consult your prescriber for clinical decisions.
          </div>
        </Card>
      </div>
    </div>
  );
}
Object.assign(window, { ScreenSettings });
  </script>

  <!-- ════════════════════════════════════════════════════
       ROOT APP
  ════════════════════════════════════════════════════ -->
  <script type="text/babel">
function VitalApp() {
  const [store, setStore] = React.useState(() => loadStore());
  const [paletteKey, setPaletteKey] = React.useState(() => loadStore()?.palette || 'cream');
  const [tab, setTab] = React.useState('today');
  const [logOpen, setLogOpen] = React.useState(false);
  const [savedFlash, setSavedFlash] = React.useState(false);

  const p = PALETTES[paletteKey] || PALETTES.cream;

  const tabs = [
    { key:'today',    label:'Today',    icon:Icons.Home  },
    { key:'levels',   label:'Levels',   icon:Icons.Wave  },
    { key:'weight',   label:'Weight',   icon:Icons.Scale },
    { key:'settings', label:'Settings', icon:Icons.Gear  },
  ];

  function onSaveShot(newStore) {
    setStore(newStore);
    setLogOpen(false);
    setSavedFlash(true);
    setTimeout(()=>setSavedFlash(false), 2000);
  }

  function onUpdate(newStore) {
    setStore(newStore);
    if (newStore.palette) setPaletteKey(newStore.palette);
  }

  if (!store) {
    return <Onboarding p={p} onComplete={s => { setStore(s); setPaletteKey(s.palette||'cream'); }}/>;
  }

  return (
    <div style={{
      position:'absolute', inset:0,
      background:p.bg, color:p.ink,
      fontFamily:TYPE.ui, overflow:'hidden',
    }}>
      {/* Status bar spacer */}
      <div style={{ height:'env(safe-area-inset-top)' }}/>

      <div style={{ position:'absolute', top:'env(safe-area-inset-top)', bottom:0, left:0, right:0, overflowY:'auto' }}>
        {tab==='today'    && <ScreenToday    p={p} store={store} onLogShot={()=>setLogOpen(true)} onGoTab={setTab}/>}
        {tab==='levels'   && <ScreenLevels   p={p} store={store}/>}
        {tab==='weight'   && <ScreenWeight   p={p} store={store} onUpdate={onUpdate}/>}
        {tab==='settings' && <ScreenSettings p={p} store={store} onUpdate={onUpdate} onPaletteChange={k=>{setPaletteKey(k);}}/>}
      </div>

      <TabBar p={p} tabs={tabs} active={tab} onTab={setTab} onLogShot={()=>setLogOpen(true)}/>

      {logOpen && (
        <ScreenLog p={p} store={store} onClose={()=>setLogOpen(false)} onSave={onSaveShot}/>
      )}

      {savedFlash && (
        <div style={{
          position:'absolute', top:'calc(env(safe-area-inset-top) + 16px)',
          left:'50%', transform:'translateX(-50%)',
          background:p.primary, color:p.primaryInk,
          padding:'10px 18px', borderRadius:R.pill,
          fontFamily:TYPE.ui, fontSize:13, fontWeight:500,
          display:'flex', alignItems:'center', gap:8,
          boxShadow:`0 8px 24px ${p.ink}25`, zIndex:400,
          animation:'flashIn 0.3s ease', whiteSpace:'nowrap',
        }}>
          <Icons.Check size={16} color={p.primaryInk}/> Shot logged
        </div>
      )}

      <style>{`
        @keyframes flashIn {
          from { transform: translate(-50%,-10px); opacity:0; }
          to   { transform: translate(-50%,0);     opacity:1; }
        }
        ::-webkit-scrollbar { display:none; }
        * { scrollbar-width:none; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
        input[type=date]::-webkit-calendar-picker-indicator { opacity:0.5; }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<VitalApp/>);
  </script>

  <!-- ════════════════════════════════════════════════════
       PWA SERVICE WORKER REGISTRATION

  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
  </script>
</body>
