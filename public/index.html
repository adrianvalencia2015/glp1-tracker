function loadStore(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null}catch{return null}}
function saveStore(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
function emptyStore(){return{meds:[],shots:[],weights:[],startWeight:null,goalWeight:null,startDate:null,palette:'cream',userName:''}}

// Peptide logs only - peptide *config* always comes from DEFAULT_PEPTIDES (code-driven),
// so protocol/dosing corrections roll out automatically. Migrates logs from v1 if present.
function loadPeptideLogs(){
  try{
    const r=localStorage.getItem(PEPTIDE_KEY);
    if(r){const d=JSON.parse(r);return Array.isArray(d.logs)?d.logs:[];}
    const old=localStorage.getItem(PEPTIDE_KEY_OLD);
    if(old){const d=JSON.parse(old);return Array.isArray(d.logs)?d.logs:[];}
  }catch{}
  return [];
}
function savePeptideLogs(logs){localStorage.setItem(PEPTIDE_KEY,JSON.stringify({v:2,logs}));}

// -- Peptide schedule overrides (user-editable days/reminders; dosing stays code-driven) --
function loadPeptideSched(){try{const r=localStorage.getItem(PEPTIDE_SCHED_KEY);return r?JSON.parse(r):{};}catch{return{};}}
function savePeptideSched(o){localStorage.setItem(PEPTIDE_SCHED_KEY,JSON.stringify(o));}
function defaultReminderTime(pt){return ({morning:"08:00",pre_workout:"07:00",post_workout:"18:00",afternoon:"14:00",night:"21:00"}[pt.defaultTiming])||"09:00";}
function mergePeptides(sched){
  sched=sched||{};
  return DEFAULT_PEPTIDES.map(pt=>{
    const ov=sched[pt.id]||{};
    const days=Array.isArray(ov.days)?ov.days:(pt.scheduleDays||[]);
    return {...pt,
      scheduleDays:days,
      weeklyTarget:days.length||1,
      reminderTime:ov.time||defaultReminderTime(pt),
      upcoming:!!pt.upcoming&&!ov.activated,
    };
  });
}
function isScheduledOn(pt,dateStr){
  if(!pt.scheduleDays||!pt.scheduleDays.length)return false;
  return pt.scheduleDays.includes(new Date(dateStr+'T12:00:00').getDay());
}

function effectiveMg(shot,med){
  if(!shot||!med)return 0;
  if(shot.unit==='mg')return shot.dose;
  if(shot.unit==='mcg')return shot.dose/1000;
  if(shot.unit==='mL'&&med.concentration)return shot.dose*med.concentration;
  if(shot.unit==='units'&&med.concentration&&med.syringeUnits)return shot.dose*(med.concentration/med.syringeUnits);
  return shot.dose;
}
function singleShotLevel(dose,hl,tmax,elapsed){
  if(elapsed<0)return 0;
  const ke=Math.LN2/hl,ka=Math.LN2/tmax;
  if(Math.abs(ka-ke)<1e-6)return dose*ke*elapsed*Math.exp(-ke*elapsed);
  return Math.max(0,dose*(ka/(ka-ke))*(Math.exp(-ke*elapsed)-Math.exp(-ka*elapsed)));
}
function totalLevel(shots,hl,tmax,atTime=Date.now()){
  return shots.reduce((s,shot)=>{
    const e=(atTime-new Date(shot.date).getTime())/86400000;
    return s+singleShotLevel(shot.dose,hl,tmax,e);
  },0);
}
function getCurrentLevel(store,atTime=Date.now()){
  const med=store.meds[0];
  if(!med||!store.shots.length)return 0;
  const shots=store.shots.filter(s=>s.medId===med.id).map(s=>({...s,dose:effectiveMg(s,med)}));
  return totalLevel(shots,med.halfLifeDays,med.tmaxDays,atTime);
}
function getPeakLevel(store){
  const med=store.meds[0];if(!med)return 10;
  const ke=Math.LN2/med.halfLifeDays,T=7;
  const accum=1/(1-Math.exp(-ke*T));
  return effectiveMg({dose:med.currentDose,unit:med.unit},med)*0.75*accum;
}
function nextShotDate(store,atTime=Date.now()){
  const med=store.meds[0];if(!med)return null;
  const shots=store.shots.filter(s=>s.medId===med.id);
  if(!shots.length)return new Date(atTime);
  const lastShot=new Date(shots[shots.length-1].date);
  const lastT=lastShot.getTime();
  if(med.scheduleDays&&med.scheduleDays.length>0){
    const lastDow=lastShot.getDay();
    const days=med.scheduleDays.slice().sort((a,b)=>a-b);
    let nextDow=days.find(d=>d>lastDow);
    if(nextDow===undefined)nextDow=days[0];
    const diff=nextDow>lastDow ? nextDow-lastDow : (7-lastDow)+nextDow;
    return new Date(lastT+diff*86400000);
  }
  return new Date(lastT+(med.scheduleIntervalDays||7)*86400000);
}
function daysUntil(date,atTime=Date.now()){
  const diff=(new Date(date).getTime()-atTime)/86400000;
  return diff>=0?Math.ceil(diff):Math.floor(diff);
}
function fmtDate(d,opts){
  const date=typeof d==='string'&&d.length===10?new Date(d+'T12:00:00'):new Date(d);
  return date.toLocaleDateString('en-US',opts||{month:'short',day:'numeric'});
}

  const d=new Date();

function daysSinceISO(iso){if(!iso)return null;return Math.floor((Date.now()-new Date(iso).getTime())/86400000);}

// -- Symptom / side-effect logging --
const NAUSEA_LEVELS=['None','Mild','Mod','Severe'];     // index 0-3
const LOWHIGH_LEVELS=['—','Low','Med','High'];          // index 0-3 (0 = unset)
function emptySymptoms(){return{nausea:0,energy:0,appetite:0,note:''};}
function hasSymptoms(s){return s&&(s.nausea>0||s.energy>0||s.appetite>0||(s.note&&s.note.trim()));}
function fmtSymptoms(s){
  if(!s)return'';
  const parts=[];
  if(s.nausea>0)parts.push(`Nausea ${NAUSEA_LEVELS[s.nausea]}`);
  if(s.energy>0)parts.push(`Energy ${LOWHIGH_LEVELS[s.energy]}`);
  if(s.appetite>0)parts.push(`Appetite ${LOWHIGH_LEVELS[s.appetite]}`);
  return parts.join(' · ');
}

// -- Titration ladder: derive dose steps from the shot log --
function titrationSteps(shots,med){
  const sorted=[...shots].filter(s=>!med||s.medId===med.id).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const steps=[];
  for(const s of sorted){
    const key=`${s.dose}|${s.unit}`;
    const last=steps[steps.length-1];
    const mg=med?effectiveMg(s,med):s.dose;
    if(!last||last.key!==key)steps.push({key,dose:s.dose,unit:s.unit,mg,date:s.date,count:1});
    else last.count++;
  }
  return steps;
}

// -- Calendar (.ics) reminder: reliable native alerts with no backend --
function pad2(n){return String(n).padStart(2,'0');}
function icsStamp(d){return `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}T${pad2(d.getHours())}${pad2(d.getMinutes())}00`;}
function nextReminderStart(med,h,m){
  const now=new Date();
  for(let i=0;i<14;i++){
    const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+i,h,m,0,0);
    if(d.getTime()<now.getTime())continue;
    if(med.scheduleDays&&med.scheduleDays.length){if(med.scheduleDays.includes(d.getDay()))return d;}
    else return d;
  }
  return new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0,0);
}
function buildRRULE(med){
  if(med.scheduleDays&&med.scheduleDays.length){
    const map=['SU','MO','TU','WE','TH','FR','SA'];
    return `RRULE:FREQ=WEEKLY;BYDAY=${med.scheduleDays.map(d=>map[d]).join(',')}`;
  }
  return `RRULE:FREQ=DAILY;INTERVAL=${med.scheduleIntervalDays||7}`;
}
function generateICS(med,timeStr){
  const [h,m]=timeStr.split(':').map(Number);
  const start=nextReminderStart(med,h,m);
  const end=new Date(start.getTime()+10*60000);
  const uid=`vital-${med.id}-${Date.now()}@vital.app`;
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Vital//GLP1 Tracker//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',`UID:${uid}`,`DTSTAMP:${icsStamp(new Date())}`,`DTSTART:${icsStamp(start)}`,`DTEND:${icsStamp(end)}`,
    buildRRULE(med),`SUMMARY:Vital - ${med.name} shot`,
    `DESCRIPTION:Time for your ${med.name} (${med.currentDose} ${med.unit}) injection.`,
    'BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:Shot reminder','TRIGGER:PT0M','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
}
function downloadFile(text,filename,type){
  const blob=new Blob([text],{type:type||'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// -- Peptide helpers --
function mgPerUnit(pt){return (pt.vialMg/pt.bacMl)/pt.syringeUnits;}
function unitsToMg(units,pt){return units*mgPerUnit(pt);}
function unitsToMcg(units,pt){return Math.round(units*mgPerUnit(pt)*1000);}
function fmtDose(units,pt){
  if(pt.doseUnit==='mg'){const mg=unitsToMg(units,pt);return `${+mg.toFixed(mg<1?2:1)} mg`;}
  return `${unitsToMcg(units,pt)} mcg`;
}
function fmtLevelVal(mg,pt){return pt.doseUnit==='mg'?(+mg.toFixed(2)).toString():String(Math.round(mg*1000));}
function fmtHL(h){return h<1?`${Math.round(h*60)} min`:`${+h.toFixed(h<10?1:0)} h`;}
function logInjectionMs(l,pt){
  if(l.time)return new Date(`${l.date}T${l.time}:00`).getTime();
  const h=TIMING_HOUR[l.timing]!=null?TIMING_HOUR[l.timing]:12;
  return new Date(`${l.date}T${String(h).padStart(2,'0')}:00:00`).getTime();
}
function peptideLevelAt(logs,pt,atMs){
  return logs.reduce((sum,l)=>{
    if(l.peptideId!==pt.id)return sum;
    const elapsedH=(atMs-logInjectionMs(l,pt))/3600000;
    if(elapsedH<0)return sum;
    return sum+singleShotLevel(unitsToMg(l.dose,pt),pt.halfLifeHours,pt.tmaxHours,elapsedH);
  },0);
}
function getWeekDates(offsetWeeks=0){
  const today=new Date();
  const day=today.getDay();
  const monday=new Date(today);
  monday.setDate(today.getDate()-((day+6)%7)+offsetWeeks*7);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
}
function getWeeklyCount(logs,peptideId,offsetWeeks=0){
  const weekDates=getWeekDates(offsetWeeks);
  return weekDates.filter(d=>logs.some(l=>l.peptideId===peptideId&&l.date===d)).length;
}

function Card({children,p,style,dark,ink,padding=18,soft}){
  return <div style={{background:soft?p.bgInset:p.bgElev,borderRadius:R.lg,padding,border:`0.5px solid ${p.line}`,...(dark?{background:ink||p.primary,color:p.primaryInk,border:'none'}:{}),  ...style}}>{children}</div>;
}
function Eyebrow({children,p,color,style}){
  return <div style={{fontFamily:TYPE.mono,fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:color||p.inkMuted,...style}}>{children}</div>;
}
function Ring({size=200,stroke=16,value,max=1,color,track,children,p}){
  const r=(size-stroke)/2,c=2*Math.PI*r,pct=Math.min(1,Math.max(0,value/max));
  return <div style={{position:'relative',width:size,height:size}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} stroke={track||p.bgInset} strokeWidth={stroke} fill="none" strokeLinecap="round"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color||p.primary} strokeWidth={stroke} fill="none" strokeLinecap="round" strokeDasharray={`${c*pct} ${c*(1-pct)}`} style={{transition:'stroke-dasharray 1s cubic-bezier(.3,.7,.3,1)'}}/>
    </svg>
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>{children}</div>
  </div>;
}
function PillBtn({children,p,onClick,kind='primary',style,icon,size='md',disabled}){
  const sz={sm:{padY:8,fs:12},md:{padY:12,fs:14},lg:{padY:16,fs:15}}[size];
  const k={primary:{bg:p.ink,fg:p.bgElev,br:'transparent'},accent:{bg:p.accent,fg:'#fff',br:'transparent'},ghost:{bg:'transparent',fg:p.ink,br:p.line},tint:{bg:p.bgInset,fg:p.ink,br:'transparent'}}[kind];
  return <button onClick={onClick} disabled={disabled} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,padding:`${sz.padY}px 20px`,borderRadius:R.pill,background:k.bg,color:k.fg,border:`1px solid ${k.br}`,fontFamily:TYPE.ui,fontSize:sz.fs,fontWeight:500,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.5:1,...style}}>{icon}{children}</button>;
}
function Chip({children,p,active,style,onClick}){
  return <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:R.pill,background:active?p.ink:'transparent',color:active?p.bgElev:p.ink,border:`0.5px solid ${active?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer',...style}}>{children}</button>;
}

// Render overlays at <body> so position:fixed escapes the scrolling screen
// container (iOS -webkit-overflow-scrolling traps fixed children, which let the
// tab bar paint on top of bottom sheets). Top-level portal = true modal layer.
function Portal({children}){return ReactDOM.createPortal(children,document.body);}

function UndoToast({label,onUndo,p}){
  return <div style={{position:'fixed',left:'50%',bottom:'calc(100px + env(safe-area-inset-bottom))',transform:'translateX(-50%)',zIndex:650,background:p.ink,color:p.bgElev,borderRadius:R.pill,padding:'8px 8px 8px 18px',display:'flex',alignItems:'center',gap:14,boxShadow:`0 10px 28px ${p.ink}55`,fontFamily:TYPE.ui,fontSize:13,fontWeight:500,whiteSpace:'nowrap',animation:'flashIn 0.2s ease'}}>
    <span>{label}</span>
    <button onClick={onUndo} style={{background:p.bgElev,color:p.ink,border:'none',borderRadius:R.pill,padding:'7px 16px',fontFamily:TYPE.ui,fontSize:13,fontWeight:600,cursor:'pointer'}}>Undo</button>
  </div>;
}

// Swipe-down-to-dismiss for bottom sheets. Attach `handlers` to a grab zone
// (the handle) and spread `panelStyle` onto the sheet panel.
function useDragToDismiss(onClose){
  const [dy,setDy]=React.useState(0);
  const start=React.useRef(null);
  const handlers={
    onTouchStart:e=>{start.current=e.touches[0].clientY;},
    onTouchMove:e=>{if(start.current==null)return;const d=e.touches[0].clientY-start.current;if(d>0)setDy(d);},
    onTouchEnd:()=>{if(dy>110){onClose();}setDy(0);start.current=null;},
  };
  const panelStyle={transform:dy?`translateY(${dy}px)`:'none',transition:dy?'none':'transform 0.25s cubic-bezier(.3,.7,.3,1)'};
  return {handlers,panelStyle};
}

function TabBar({tabs,active,onTab,p,onAction}){
  const left=tabs.slice(0,2);
  const right=tabs.slice(2);
  return <div style={{position:'absolute',bottom:0,left:0,right:0,paddingBottom:'max(28px,env(safe-area-inset-bottom))',paddingTop:8,background:`linear-gradient(to top,${p.bg} 60%,${p.bg}00)`,display:'flex',justifyContent:'space-around',alignItems:'center',zIndex:30}}>
    {left.map(t=><button key={t.key} onClick={()=>onTab(t.key)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:'6px 6px',color:active===t.key?p.ink:p.inkMuted,fontFamily:TYPE.ui,fontSize:10,fontWeight:500,minWidth:48}}><t.icon size={22} color="currentColor"/><span>{t.label}</span></button>)}
    <button onClick={onAction} style={{width:54,height:54,borderRadius:27,background:p.ink,color:p.bgElev,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 8px 20px ${p.ink}40`,marginTop:-22,flexShrink:0}}><Icons.Plus size={22} color={p.bgElev}/></button>
    {right.map(t=><button key={t.key} onClick={()=>onTab(t.key)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:'6px 6px',color:active===t.key?p.ink:p.inkMuted,fontFamily:TYPE.ui,fontSize:10,fontWeight:500,minWidth:48}}><t.icon size={22} color="currentColor"/><span>{t.label}</span></button>)}
  </div>;
}

function QuickActionSheet({p,onShot,onPeptide,onWeight,onWater,onClose}){
  const actions=[
    {label:'Log a shot',sub:'GLP-1 injection dose & site',icon:Icons.Pill,color:p.primary,soft:p.primarySoft,fn:onShot},
    {label:'Log a peptide',sub:'Tesa · IGF-1 · CJC/Ipa · MOTS-C',icon:Icons.Flask,color:p.weight,soft:p.weightSoft,fn:onPeptide},
    {label:'Log weight',sub:"Today's weigh-in",icon:Icons.Weight,color:p.accent,soft:p.accentSoft,fn:onWeight},
    {label:'Log water',sub:'Daily oz intake',icon:Icons.Wave,color:p.success,soft:p.primarySoft,fn:onWater},
  ];
  return <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)'}}/>
    <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 16px',paddingBottom:'max(32px,env(safe-area-inset-bottom))'}}>
      <div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto 20px'}}/>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {actions.map(a=>(
          <button key={a.label} onClick={a.fn} style={{display:'flex',alignItems:'center',gap:14,padding:'15px 18px',borderRadius:R.lg,background:p.bgInset,border:`0.5px solid ${p.line}`,cursor:'pointer',textAlign:'left'}}>
            <div style={{width:42,height:42,borderRadius:21,background:a.soft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><a.icon size={20} color={a.color}/></div>
            <div>
              <div style={{fontFamily:TYPE.ui,fontSize:15,color:p.ink,fontWeight:500}}>{a.label}</div>
              <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkMuted,marginTop:2}}>{a.sub}</div>
            </div>
          </button>
        ))}
      </div>
      <button onClick={onClose} style={{width:'100%',marginTop:12,padding:'14px',borderRadius:R.pill,background:'transparent',border:`0.5px solid ${p.line}`,color:p.inkSoft,fontFamily:TYPE.ui,fontSize:14,cursor:'pointer'}}>Cancel</button>
    </div>
  </div>;
}
function ScreenHeader({p,eyebrow,title,action,sub}){
  return <div style={{padding:'8px 22px 16px',display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
    <div>
      {eyebrow&&<Eyebrow p={p} style={{marginBottom:6}}>{eyebrow}</Eyebrow>}
      <div style={{fontFamily:TYPE.display,fontSize:36,color:p.ink,letterSpacing:'-0.025em',lineHeight:0.95}}>{title}</div>
      {sub&&<div style={{fontFamily:TYPE.ui,fontSize:13,color:p.inkSoft,marginTop:6}}>{sub}</div>}
    </div>
    {action}
  </div>;
}
function Delta({value,unit,p,invert,style}){
  const neg=value<0,good=invert?!neg:neg;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,color:good?p.success:p.warn,fontFamily:TYPE.ui,fontSize:13,fontWeight:500,...style}}><span>{neg?'↓':'↑'}</span><span>{Math.abs(value)}{unit||''}</span></span>;
}
function InputField({label,value,onChange,type='text',placeholder,p,suffix,hint}){
  return <div style={{marginBottom:16}}>
    {label&&<div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginBottom:6,fontWeight:500}}>{label}</div>}
    <div style={{position:'relative',display:'flex',alignItems:'center'}}>
      <input type={type} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} style={{width:'100%',padding:'14px 16px',paddingRight:suffix?40:16,background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:16,color:p.ink,outline:'none'}}/>
      {suffix&&<span style={{position:'absolute',right:14,fontFamily:TYPE.ui,fontSize:13,color:p.inkMuted,pointerEvents:'none'}}>{suffix}</span>}
    </div>
    {hint&&<div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,marginTop:4}}>{hint}</div>}
  </div>;
}

// MED SETUP FORM
// ═══════════════════════════════════════════════
function MedSetupForm({p,initialMed,onSave,onCancel,title="Set up medication"}){
  const [medKey,setMedKey]=React.useState(()=>{
    if(!initialMed)return'tirzepatide';
    return Object.keys(MEDS_DB).find(k=>MEDS_DB[k].name===initialMed.name)||'tirzepatide';
  });
  const [formulation,setFormulation]=React.useState(initialMed?.formulation||'pen');
  const [dose,setDose]=React.useState(String(initialMed?.currentDose||'7.5'));
  const [unit,setUnit]=React.useState(initialMed?.unit||'mg');
  const [concentration,setConcentration]=React.useState(String(initialMed?.concentration||''));
  const [syringeUnits,setSyringeUnits]=React.useState(String(initialMed?.syringeUnits||'100'));
  const [scheduleDays,setScheduleDays]=React.useState(initialMed?.scheduleDays||[]);
  const [scheduleInterval,setScheduleInterval]=React.useState(initialMed?.scheduleIntervalDays||7);
  const [useSpecificDays,setUseSpecificDays]=React.useState(initialMed?.scheduleDays?.length>0||false);
  const [customHalfLife,setCustomHalfLife]=React.useState(String(initialMed?.halfLifeDays||''));
  const [name,setName]=React.useState(initialMed?.name||'');

  const db=MEDS_DB[medKey];
  const isCompound=formulation==='compound_units'||formulation==='compound_ml';
  const isUnits=formulation==='compound_units';
  const isMl=formulation==='compound_ml';

  let mgPreview=null;
  const doseNum=parseFloat(dose);
  const concNum=parseFloat(concentration);
  const syrNum=parseFloat(syringeUnits);
  let mgPerShot=null;
  if(isUnits&&doseNum>0&&concNum>0&&syrNum>0){
    const mgpu=concNum/syrNum;
    mgPerShot=doseNum*mgpu;
    const mlPerShot=doseNum/syrNum;
    mgPreview=`${doseNum} units = ${mlPerShot.toFixed(2)} mL · ${mgPerShot.toFixed(2)} mg per shot`;
  }else if(isMl&&doseNum>0&&concNum>0){
    mgPerShot=doseNum*concNum;
    mgPreview=`${doseNum} mL × ${concNum} mg/mL = ${mgPerShot.toFixed(2)} mg per shot`;
  }
  let doseWarn=null;
  if(mgPerShot!=null&&mgPerShot>50)doseWarn=`${mgPerShot.toFixed(0)} mg per shot is very high for a GLP-1 (typical doses are under ~15 mg). Double-check your concentration${isMl?", and make sure you didn't mean units":''}.`;
  else if(isMl&&doseNum>2)doseWarn=`${doseNum} mL is a large injection volume — most compound users dose in units, not mL. Check that you picked the right option above.`;

  function handleSave(){
    const hl=parseFloat(customHalfLife)||db.halfLifeDays;
    const med={
      id:initialMed?.id||`med_${Date.now()}`,
      name:medKey==='other'?name:db.name,
      brand:db.brand,
      halfLifeDays:hl,
      tmaxDays:db.tmaxDays,
      currentDose:doseNum||0,
      unit:isUnits?'units':isMl?'mL':unit,
      formulation,
      concentration:isCompound?concNum:null,
      syringeUnits:isUnits?syrNum:null,
      scheduleDays:useSpecificDays?scheduleDays:[],
      scheduleIntervalDays:useSpecificDays?7:scheduleInterval,
      startedDate:initialMed?.startedDate||localToday(),
    };
    onSave(med);
  }

  const toggleDay=d=>setScheduleDays(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d].sort((a,b)=>a-b));
  const canSave=doseNum>0&&(medKey!=='other'||name.trim())&&(!isCompound||concNum>0)&&(!useSpecificDays||scheduleDays.length>0);

  return <div style={{position:'absolute',inset:0,background:p.bg,display:'flex',flexDirection:'column',zIndex:300}}>
    <div style={{padding:'12px 22px 4px',paddingTop:'max(12px,env(safe-area-inset-top))',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`0.5px solid ${p.line}`}}>
      <button onClick={onCancel} style={{background:'none',border:'none',color:p.inkSoft,fontFamily:TYPE.ui,fontSize:14,cursor:'pointer',padding:4}}>Cancel</button>
      <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>{title}</div>
      <PillBtn p={p} kind="primary" size="sm" onClick={handleSave} disabled={!canSave}>Save</PillBtn>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'20px 22px 40px'}}>
      <div style={{marginBottom:24}}>
        <Eyebrow p={p} style={{marginBottom:10}}>Medication</Eyebrow>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {Object.entries(MEDS_DB).map(([key,med])=>(
            <button key={key} onClick={()=>setMedKey(key)} style={{padding:'12px 14px',borderRadius:R.md,textAlign:'left',background:medKey===key?p.primarySoft:p.bgElev,border:`0.5px solid ${medKey===key?p.primary:p.line}`,cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:8,height:8,borderRadius:4,background:medKey===key?p.primary:p.line,flexShrink:0}}/>
              <div>
                <div style={{fontFamily:TYPE.ui,fontSize:14,color:p.ink,fontWeight:500}}>{med.name}</div>
                {med.brand&&<div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,marginTop:1}}>{med.brand}</div>}
              </div>
            </button>
          ))}
        </div>
        {medKey==='other'&&<div style={{marginTop:10}}><InputField label="Medication name" value={name} onChange={setName} p={p} placeholder="e.g. Ozempic"/></div>}
      </div>
      <div style={{marginBottom:24}}>
        <Eyebrow p={p} style={{marginBottom:10}}>How do you dose it?</Eyebrow>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {[
            {key:'pen',label:'Pre-filled pen / auto-injector',sub:'Dose in mg (e.g. 2.5 mg, 5 mg)'},
            {key:'compound_units',label:'Compound vial — syringe in units',sub:'e.g. 25 units from a 100-unit syringe'},
            {key:'compound_ml',label:'Compound vial — syringe in mL',sub:'e.g. 0.25 mL'},
          ].map(f=>(
            <button key={f.key} onClick={()=>setFormulation(f.key)} style={{padding:'12px 14px',borderRadius:R.md,textAlign:'left',background:formulation===f.key?p.primarySoft:p.bgElev,border:`0.5px solid ${formulation===f.key?p.primary:p.line}`,cursor:'pointer'}}>
              <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>{f.label}</div>
              <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,marginTop:2}}>{f.sub}</div>
            </button>
          ))}
        </div>
      </div>
      {isCompound&&<div style={{marginBottom:24,padding:16,background:p.bgInset,borderRadius:R.lg,border:`0.5px solid ${p.line}`}}>
        <Eyebrow p={p} style={{marginBottom:12}}>Vial info</Eyebrow>
        <InputField label="Concentration (mg/mL)" value={concentration} onChange={setConcentration} type="number" placeholder="e.g. 20" p={p} suffix="mg/mL" hint="Found on your vial label"/>
        {isUnits&&<InputField label="Syringe size" value={syringeUnits} onChange={setSyringeUnits} type="number" placeholder="100" p={p} suffix="units/mL" hint="Most insulin syringes are 100 units/mL"/>}
        {mgPreview&&<div style={{marginTop:4,padding:'10px 14px',background:p.primarySoft,borderRadius:R.md,fontFamily:TYPE.mono,fontSize:11,color:p.primary,fontWeight:500}}>{mgPreview}</div>}
        {doseWarn&&<div style={{marginTop:8,padding:'10px 14px',background:`${p.accent}1A`,border:`0.5px solid ${p.accent}66`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:12,color:p.accent,lineHeight:1.45}}>⚠ {doseWarn}</div>}
      </div>}
      <div style={{marginBottom:24}}>
        <Eyebrow p={p} style={{marginBottom:10}}>Current dose</Eyebrow>
        {formulation==='pen'?<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[2.5,5,7.5,10,12.5,15].map(d=>(
            <button key={d} onClick={()=>setDose(String(d))} style={{flex:'1 1 60px',padding:'14px 8px',borderRadius:R.md,background:dose===String(d)?p.ink:p.bgElev,color:dose===String(d)?p.bgElev:p.ink,border:`0.5px solid ${dose===String(d)?'transparent':p.line}`,fontFamily:TYPE.display,fontSize:18,cursor:'pointer'}}>{d}</button>
          ))}
        </div>:<InputField value={dose} onChange={setDose} type="number" placeholder={isUnits?'e.g. 25':isMl?'e.g. 0.25':'dose'} p={p} suffix={isUnits?'units':isMl?'mL':'mg'}/>}
      </div>
      <div style={{marginBottom:24}}>
        <Eyebrow p={p} style={{marginBottom:10}}>Injection schedule</Eyebrow>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button onClick={()=>setUseSpecificDays(false)} style={{flex:1,padding:'10px',borderRadius:R.md,background:!useSpecificDays?p.primarySoft:p.bgElev,border:`0.5px solid ${!useSpecificDays?p.primary:p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,color:!useSpecificDays?p.primary:p.ink,cursor:'pointer'}}>Every N days</button>
          <button onClick={()=>setUseSpecificDays(true)} style={{flex:1,padding:'10px',borderRadius:R.md,background:useSpecificDays?p.primarySoft:p.bgElev,border:`0.5px solid ${useSpecificDays?p.primary:p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,color:useSpecificDays?p.primary:p.ink,cursor:'pointer'}}>Specific days</button>
        </div>
        {useSpecificDays
          ?<div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
              {DAYS.map((d,i)=>(
                <button key={i} onClick={()=>toggleDay(i)} style={{flex:'1 1 40px',padding:'10px 4px',borderRadius:R.md,background:scheduleDays.includes(i)?p.ink:p.bgElev,color:scheduleDays.includes(i)?p.bgElev:p.ink,border:`0.5px solid ${scheduleDays.includes(i)?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>{d}</button>
              ))}
            </div>
            {scheduleDays.length>0&&<div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>
              Injecting every {scheduleDays.map(d=>FULLDAYS[d]).join(' & ')}
            </div>}
          </div>
          :<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[7,10,14].map(n=>(
              <button key={n} onClick={()=>setScheduleInterval(n)} style={{flex:1,padding:'12px 8px',borderRadius:R.md,background:scheduleInterval===n?p.ink:p.bgElev,color:scheduleInterval===n?p.bgElev:p.ink,border:`0.5px solid ${scheduleInterval===n?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:14,fontWeight:500,cursor:'pointer'}}>
                {n===7?'Weekly':n===10?'Every 10d':'Bi-weekly'}
              </button>
            ))}
          </div>
        }
      </div>
      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:10}}>Advanced (optional)</Eyebrow>
        <InputField label={`Half-life override (default: ${db.halfLifeDays}d)`} value={customHalfLife} onChange={setCustomHalfLife} type="number" placeholder={String(db.halfLifeDays)} p={p} suffix="days" hint="Leave blank to use the FDA label value"/>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// ONBOARDING
// ═══════════════════════════════════════════════
function Onboarding({p,onComplete}){
  const [step,setStep]=React.useState(0);
  const [name,setName]=React.useState('');
  const [med,setMed]=React.useState(null);
  const [showMedForm,setShowMedForm]=React.useState(false);
  const [startWeight,setStartWeight]=React.useState('');
  const [goalWeight,setGoalWeight]=React.useState('');
  const [firstShotDate,setFirstShotDate]=React.useState(localToday());

  function handleMedSave(m){setMed(m);setShowMedForm(false);setStep(2);}

  function handleFinish(){
    const medId=med?.id||`med_${Date.now()}`;
    const shotDate=new Date(`${firstShotDate}T12:00:00`);
    const store={
      ...emptyStore(),
      userName:name.trim(),
      palette:'cream',
      meds:[{...med,id:medId}],
      shots:[{id:`shot_${Date.now()}`,medId,dose:med.currentDose,unit:med.unit,date:shotDate.toISOString(),site:'L. Abdomen',notes:'First logged shot',weight:startWeight?parseFloat(startWeight):null}],
      weights:startWeight?[{id:`wt_${Date.now()}`,weight:parseFloat(startWeight),date:firstShotDate,notes:'Starting weight'}]:[],
      startWeight:startWeight?parseFloat(startWeight):null,
      goalWeight:goalWeight?parseFloat(goalWeight):null,
      startDate:firstShotDate,
    };
    saveStore(store);
    onComplete(store);
  }

  if(showMedForm)return <MedSetupForm p={p} onSave={handleMedSave} onCancel={()=>setShowMedForm(false)} title="Set up your medication"/>;

  const steps=[
    {title:<><span style={{fontStyle:'italic',color:p.accent}}>Welcome</span> to Vital</>,sub:'Your private GLP-1 tracker. All data stays on your device — no accounts, no cloud.',
      content:<InputField label="What should we call you?" value={name} onChange={setName} p={p} placeholder="Your first name"/>,
      canAdvance:name.trim().length>0},
    {title:<>Your <span style={{fontStyle:'italic',color:p.accent}}>medication</span></>,sub:'Tap to set up your drug, dose, formulation, and schedule.',
      content:<button onClick={()=>setShowMedForm(true)} style={{width:'100%',padding:'18px',borderRadius:R.lg,background:med?p.primarySoft:p.bgElev,border:`0.5px solid ${med?p.primary:p.line}`,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          {med?<><div style={{fontFamily:TYPE.ui,fontSize:15,color:p.primary,fontWeight:500}}>{med.name} · {med.currentDose} {med.unit}</div>
          <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkMuted,marginTop:2}}>{med.scheduleDays?.length?med.scheduleDays.map(d=>DAYS[d]).join(', '):`Every ${med.scheduleIntervalDays||7} days`}</div></>
          :<div style={{fontFamily:TYPE.ui,fontSize:14,color:p.ink}}>Tap to set up →</div>}
        </div>
        <Icons.ChevRight size={18} color={med?p.primary:p.inkMuted}/>
      </button>,
      canAdvance:!!med},
    {title:<>When was your <span style={{fontStyle:'italic',color:p.accent}}>last shot?</span></>,sub:"We'll use this to calculate your current drug level right now.",
      content:<input type="date" value={firstShotDate} max={localToday()} onChange={e=>setFirstShotDate(e.target.value)} style={{width:'100%',padding:'14px 16px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:16,color:p.ink,outline:'none'}}/>,
      canAdvance:!!firstShotDate},
    {title:<>Weight <span style={{fontStyle:'italic',color:p.accent}}>goal</span></>,sub:'Optional — helps track progress and project your goal date.',
      content:<><InputField label="Starting weight" value={startWeight} onChange={setStartWeight} type="number" p={p} placeholder="lbs" suffix="lbs"/><InputField label="Goal weight" value={goalWeight} onChange={setGoalWeight} type="number" p={p} placeholder="lbs" suffix="lbs"/></>,
      canAdvance:true},
  ];
  const curr=steps[step];

  return <div style={{position:'absolute',inset:0,background:p.bg,fontFamily:TYPE.ui,color:p.ink,display:'flex',flexDirection:'column',paddingTop:'max(60px,env(safe-area-inset-top))'}}>
    <div style={{padding:'0 22px 24px'}}>
      <div style={{display:'flex',gap:4}}>{steps.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?p.primary:p.bgInset,transition:'background 0.3s'}}/>)}</div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'0 22px'}}>
      <div style={{fontFamily:TYPE.display,fontSize:36,color:p.ink,letterSpacing:'-0.025em',lineHeight:1.05,marginBottom:8}}>{curr.title}</div>
      <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.inkSoft,lineHeight:1.5,marginBottom:28}}>{curr.sub}</div>
      {curr.content}
    </div>
    <div style={{padding:'16px 22px max(28px,env(safe-area-inset-bottom))',borderTop:`0.5px solid ${p.line}`,display:'flex',gap:10}}>
      {step>0&&<PillBtn p={p} kind="ghost" onClick={()=>setStep(s=>s-1)} style={{flex:0}}>Back</PillBtn>}
      <PillBtn p={p} kind="primary" disabled={!curr.canAdvance} onClick={()=>step<steps.length-1?setStep(s=>s+1):handleFinish()} style={{flex:1}}>
        {step===steps.length-1?'Start tracking':'Continue'}
      </PillBtn>
    </div>
  </div>;
}

// EDIT SHOT SHEET
// ═══════════════════════════════════════════════
function EditShotSheet({p,shot,med,onSave,onDelete,onClose}){
  const d=new Date(shot.date);
  const localDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const localTime=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const [dose,setDose]=React.useState(String(shot.dose));
  const [date,setDate]=React.useState(localDate);
  const [time,setTime]=React.useState(localTime);
  const [site,setSite]=React.useState(shot.site||'L. Abdomen');
  const [symptoms,setSymptoms]=React.useState(shot.symptoms||emptySymptoms());
  const allSites=INJECTION_SITES;
  const doseNum=parseFloat(dose)||0;
  const mgEff=med&&doseNum?effectiveMg({dose:doseNum,unit:shot.unit},med):doseNum;
  const showMg=shot.unit!=='mg'&&doseNum>0;
  function setSym(k,v){setSymptoms(s=>({...s,[k]:s[k]===v?0:v}));}

  function handleSave(){
    const newDate=new Date(`${date}T${time}:00`).toISOString();
    onSave({...shot,dose:doseNum,date:newDate,site,symptoms});
  }
  const {handlers,panelStyle}=useDragToDismiss(onClose);

  return <div style={{position:'fixed',inset:0,zIndex:600,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)'}}/>
    <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 22px',paddingBottom:'max(32px,env(safe-area-inset-bottom))',...panelStyle}}>
      <div {...handlers} style={{padding:'2px 0 14px',margin:'-2px 0 2px',touchAction:'none',cursor:'grab'}}><div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto'}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontFamily:TYPE.display,fontSize:24,color:p.ink,letterSpacing:'-0.02em'}}>Edit shot</div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:p.inkMuted,padding:4}}><Icons.X size={18} color={p.inkMuted}/></button>
      </div>
      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Date & time</Eyebrow>
        <div style={{display:'flex',gap:8}}>
          <input type="date" value={date} max={localToday()} onChange={e=>setDate(e.target.value)} style={{flex:1,padding:'12px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:14,color:p.ink,outline:'none'}}/>
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{width:110,padding:'12px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:14,color:p.ink,outline:'none'}}/>
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Dose ({shot.unit})</Eyebrow>
        {med?.formulation==='pen'
          ?<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[2.5,5,7.5,10,12.5,15].map(d=>(
              <button key={d} onClick={()=>setDose(String(d))} style={{flex:'1 1 50px',padding:'10px 4px',borderRadius:R.md,background:dose===String(d)?p.ink:p.bgInset,color:dose===String(d)?p.bgElev:p.ink,border:`0.5px solid ${dose===String(d)?'transparent':p.line}`,fontFamily:TYPE.display,fontSize:16,cursor:'pointer'}}>{d}</button>
            ))}
          </div>
          :<input type="number" value={dose} onChange={e=>setDose(e.target.value)} style={{width:'100%',padding:'12px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:16,color:p.ink,outline:'none'}}/>
        }
        {showMg&&doseNum>0&&<div style={{marginTop:6,fontFamily:TYPE.mono,fontSize:11,color:p.primary}}>= {mgEff.toFixed(2)} mg active drug</div>}
      </div>
      <div style={{marginBottom:18}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Injection site</Eyebrow>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {allSites.map(s=>(
            <button key={s} onClick={()=>setSite(s)} style={{padding:'7px 12px',borderRadius:R.pill,background:site===s?p.ink:p.bgInset,color:site===s?p.bgElev:p.ink,border:`0.5px solid ${site===s?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer',whiteSpace:'nowrap'}}>{s}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <Eyebrow p={p} style={{marginBottom:10}}>How are you feeling? <span style={{color:p.inkMuted,textTransform:'none',letterSpacing:0}}>· optional</span></Eyebrow>
        {[
          {key:'nausea',label:'Nausea',opts:[[1,'Mild'],[2,'Mod'],[3,'Severe']]},
          {key:'energy',label:'Energy',opts:[[1,'Low'],[2,'Med'],[3,'High']]},
          {key:'appetite',label:'Appetite',opts:[[1,'Low'],[2,'Normal'],[3,'High']]},
        ].map(row=>(
          <div key={row.key} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,width:64,flexShrink:0}}>{row.label}</span>
            <div style={{display:'flex',gap:6,flex:1}}>
              {row.opts.map(([v,lbl])=>{const on=symptoms[row.key]===v;return <button key={v} onClick={()=>setSym(row.key,v)} style={{flex:1,padding:'8px 4px',borderRadius:R.md,background:on?p.ink:p.bgInset,color:on?p.bgElev:p.ink,border:`0.5px solid ${on?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>{lbl}</button>;})}
            </div>
          </div>
        ))}
        <input type="text" value={symptoms.note} onChange={e=>setSymptoms(s=>({...s,note:e.target.value}))} placeholder="Other notes (optional)" style={{width:'100%',marginTop:4,padding:'11px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:14,color:p.ink,outline:'none'}}/>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onDelete(shot.id)} style={{padding:'14px 18px',borderRadius:R.pill,background:p.bgInset,color:p.accent,border:`0.5px solid ${p.line}`,fontFamily:TYPE.ui,fontSize:14,fontWeight:500,cursor:'pointer'}}>Delete</button>
        <PillBtn p={p} kind="primary" onClick={handleSave} disabled={!doseNum} style={{flex:1}}>Save changes</PillBtn>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// SCREEN: TODAY
// ═══════════════════════════════════════════════
function ScreenToday({p,store,onLogShot,onGoTab,onUpdate,onLogWeight,onUndo}){
  const NOW=Date.now();
  const [editingShot,setEditingShot]=React.useState(null);
  const level=getCurrentLevel(store,NOW);
  const peak=getPeakLevel(store);
  const next=nextShotDate(store,NOW);
  const dleft=next?daysUntil(next,NOW):null;
  const todayLabel=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const wts=store.weights||[];
  const todayW=wts.length?wts[wts.length-1].weight:null;
  const weekAgo=wts.length>8?wts[Math.max(0,wts.length-8)].weight:wts.length?wts[0].weight:null;
  const wkDelta=todayW&&weekAgo?+(todayW-weekAgo).toFixed(1):null;
  const totalLost=store.startWeight&&todayW?+(store.startWeight-todayW).toFixed(1):null;
  const med=store.meds[0];

  function handleEditSave(updated){
    const newStore={...store,shots:store.shots.map(s=>s.id===updated.id?updated:s).sort((a,b)=>new Date(a.date)-new Date(b.date))};
    saveStore(newStore);onUpdate(newStore);setEditingShot(null);
  }
  function handleDelete(id){
    const prev=store;
    const newStore={...store,shots:store.shots.filter(s=>s.id!==id)};
    saveStore(newStore);onUpdate(newStore);setEditingShot(null);
    onUndo&&onUndo('Shot deleted',()=>{saveStore(prev);onUpdate(prev);});
  }

  return <div style={{padding:'8px 0 110px',fontFamily:TYPE.ui,color:p.ink,background:p.bg,minHeight:'100%'}}>
    <div style={{padding:'0 22px 4px'}}><Eyebrow p={p}>{todayLabel}</Eyebrow></div>
    <div style={{padding:'0 22px 24px'}}>
      <div style={{fontFamily:TYPE.display,fontSize:36,color:p.ink,lineHeight:0.95,letterSpacing:'-0.025em'}}>
        Hi, {store.userName||'there'}<span style={{fontStyle:'italic',color:p.accent}}>.</span>
      </div>
    </div>

    {(()=>{
      const today=localToday();
      const pLogs=loadPeptideLogs();
      const items=[];
      if(med&&dleft<=0)items.push({key:'glp1',name:med.name,sub:`${med.currentDose} ${med.unit} · ${dleft<0?`${Math.abs(dleft)}d overdue`:'due today'}`,color:p.primary,done:false,tap:onLogShot});
      mergePeptides(loadPeptideSched()).filter(pt=>!pt.upcoming).forEach(pt=>{
        const done=pLogs.some(l=>l.peptideId===pt.id&&l.date===today);
        const scheduledToday=isScheduledOn(pt,today);
        if(done||scheduledToday)items.push({key:pt.id,name:pt.name,sub:done?`Logged today`:`${fmtDose(pt.defaultDose,pt)} · ${pt.timingLabel.toLowerCase()}`,color:pt.color,done,tap:()=>onGoTab('peptides')});
      });
      if(!items.length)return null;
      const remaining=items.filter(i=>!i.done).length;
      return <div style={{padding:'0 16px 14px'}}>
        <Card p={p} padding={0}>
          <div style={{padding:'16px 18px 10px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <Eyebrow p={p}>Today's protocol</Eyebrow>
            <span style={{fontFamily:TYPE.mono,fontSize:10,color:remaining?p.accent:p.success,letterSpacing:'0.06em'}}>{remaining?`${remaining} LEFT`:'ALL DONE'}</span>
          </div>
          {items.map((it,i)=>(
            <button key={it.key} onClick={it.tap} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'11px 18px',borderTop:`0.5px solid ${p.lineSoft}`,background:'none',border:'none',borderBottom:'none',cursor:'pointer',textAlign:'left'}}>
              <div style={{width:22,height:22,borderRadius:11,flexShrink:0,background:it.done?it.color:'transparent',border:`1.5px solid ${it.done?it.color:p.line}`,display:'flex',alignItems:'center',justifyContent:'center'}}>{it.done&&<Icons.Check size={12} color="#fff"/>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:TYPE.ui,fontSize:14,color:it.done?p.inkMuted:p.ink,fontWeight:500,textDecoration:it.done?'line-through':'none'}}>{it.name}</div>
                <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginTop:1,letterSpacing:'0.03em'}}>{it.sub}</div>
              </div>
              {!it.done&&<Icons.ChevRight size={16} color={p.inkMuted}/>}
            </button>
          ))}
        </Card>
      </div>;
    })()}

    {med?<div style={{padding:'0 16px 14px'}}>
      <Card p={p} dark ink={p.primary} padding={0} style={{overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',inset:0,opacity:0.08,pointerEvents:'none',background:`radial-gradient(circle at 80% 20%,${p.bgElev} 0%,transparent 50%)`}}/>
        <div style={{display:'flex',padding:'22px 22px 18px',gap:16,position:'relative'}}>
          <Ring size={130} stroke={11} value={level} max={Math.max(peak*1.1,level+0.1)} color={p.bgElev} track={`${p.bgElev}22`} p={p}>
            <div style={{textAlign:'center',color:p.bgElev}}>
              <div style={{fontFamily:TYPE.display,fontSize:34,lineHeight:0.9,letterSpacing:'-0.03em'}}>{level.toFixed(2)}</div>
              <div style={{fontFamily:TYPE.ui,fontSize:9,opacity:0.7,marginTop:2,letterSpacing:'0.06em'}}>MG ACTIVE</div>
            </div>
          </Ring>
          <div style={{flex:1,color:p.bgElev,display:'flex',flexDirection:'column',justifyContent:'space-between',minWidth:0}}>
            <div>
              <div style={{fontFamily:TYPE.mono,fontSize:9,opacity:0.6,letterSpacing:'0.14em'}}>IN YOUR SYSTEM</div>
              <div style={{fontFamily:TYPE.display,fontSize:22,marginTop:2,fontStyle:'italic',lineHeight:1.1}}>{med.name}</div>
              <div style={{fontFamily:TYPE.ui,fontSize:12,opacity:0.7,marginTop:2}}>
                {med.currentDose} {med.unit} · {med.scheduleDays?.length?med.scheduleDays.map(d=>DAYS[d]).join('/'):`every ${med.scheduleIntervalDays||7}d`}
              </div>
            </div>
            {next&&<div style={{marginTop:16}}>
              <div style={{fontFamily:TYPE.mono,fontSize:9,opacity:0.6,letterSpacing:'0.14em',marginBottom:4}}>NEXT SHOT</div>
              <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                <span style={{fontFamily:TYPE.display,fontSize:28}}>{dleft===0?'Today':dleft===1?'Tomorrow':dleft>1?`In ${dleft}d`:'Overdue'}</span>
                {dleft>0&&dleft!==1&&<span style={{fontFamily:TYPE.ui,fontSize:11,opacity:0.7}}>{fmtDate(next,{weekday:'short',month:'short',day:'numeric'})}</span>}
              </div>
              {dleft<=0&&<div style={{marginTop:8,display:'inline-flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:R.pill,background:`${p.warn}25`,color:p.warn,fontFamily:TYPE.mono,fontSize:10,fontWeight:600,letterSpacing:'0.08em'}}>⏰ Shot due{dleft<0?` (${Math.abs(dleft)}d ago)`:''}</div>}
            </div>}
          </div>
        </div>
        <div style={{padding:'0 22px 18px',borderTop:`0.5px solid ${p.bgElev}18`}}>
          <button onClick={onLogShot} style={{width:'100%',padding:'12px',borderRadius:R.pill,background:`${p.bgElev}15`,border:`0.5px solid ${p.bgElev}30`,color:p.bgElev,fontFamily:TYPE.ui,fontSize:13,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <Icons.Plus size={14} color={p.bgElev}/> Log a shot
          </button>
        </div>
      </Card>
    </div>:null}

    {todayW&&<div style={{padding:'0 16px 14px'}}>
      <Card p={p} padding={0}>
        <div style={{padding:'18px 18px 14px',display:'flex',alignItems:'center',gap:16}}>
          <div style={{width:44,height:44,borderRadius:22,background:p.weightSoft,color:p.weight,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icons.Weight size={20} color={p.weight}/></div>
          <div style={{flex:1}}>
            <Eyebrow p={p} style={{marginBottom:4}}>Current weight</Eyebrow>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontFamily:TYPE.display,fontSize:36,color:p.ink,letterSpacing:'-0.025em',lineHeight:0.9}}>{todayW}</span>
              <span style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>lbs</span>
              {wkDelta!==null&&<Delta value={wkDelta} unit=" lbs" p={p} invert style={{fontSize:12}}/>}
            </div>
            {totalLost!==null&&totalLost>0&&<div style={{fontFamily:TYPE.ui,fontSize:12,color:p.success,marginTop:4}}>↓ {totalLost} lbs total lost</div>}
          </div>
          <button onClick={()=>onGoTab('weight')} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icons.ChevRight size={18} color={p.inkMuted}/></button>
        </div>
      </Card>
    </div>}

    {(()=>{
      const today=localToday();
      const waterGoal=store.waterGoalOz||64;
      const todayWater=store.water?.find(w=>w.date===today);
      const oz=todayWater?.oz||0;
      const pct=Math.min(1,oz/waterGoal);
      return <div style={{padding:'0 16px 14px'}}>
        <button onClick={()=>onGoTab('weight')} style={{width:'100%',textAlign:'left',background:'none',border:'none',cursor:'pointer',padding:0}}>
          <Card p={p} padding={14}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:40,height:40,borderRadius:20,background:p.accentSoft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',bottom:0,left:0,right:0,height:`${pct*100}%`,background:`${p.accent}35`,transition:'height 0.5s'}}/>
                <Icons.Drop size={18} color={p.accent} style={{position:'relative'}}/>
              </div>
              <div style={{flex:1}}>
                <Eyebrow p={p} style={{marginBottom:3}}>Water today</Eyebrow>
                <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                  <span style={{fontFamily:TYPE.display,fontSize:24,color:p.ink,letterSpacing:'-0.02em',lineHeight:0.9}}>{oz}</span>
                  <span style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft}}>/ {waterGoal} oz</span>
                </div>
              </div>
              <div style={{width:60}}>
                <div style={{height:5,borderRadius:3,background:p.bgInset,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct*100}%`,borderRadius:3,background:p.accent}}/>
                </div>
                <div style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,marginTop:3,textAlign:'right'}}>{Math.round(pct*100)}%</div>
              </div>
            </div>
          </Card>
        </button>
      </div>;
    })()}

    {store.shots.length>0&&<>
      <div style={{padding:'8px 22px 8px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <Eyebrow p={p}>Recent shots</Eyebrow>
        <button onClick={()=>onGoTab('levels')} style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,background:'none',border:'none',cursor:'pointer'}}>See levels →</button>
      </div>
      <div style={{padding:'0 16px 16px'}}>
        <Card p={p} padding={0}>
          {[...store.shots].slice(-3).reverse().map((s,i,arr)=>{
            const mgEff=med?effectiveMg(s,med):s.dose;
            return <button key={s.id} onClick={()=>setEditingShot(s)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'14px 18px',borderBottom:i===arr.length-1?'none':`0.5px solid ${p.lineSoft}`,background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
              <div style={{width:36,height:36,borderRadius:18,background:p.primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icons.Pill size={16} color={p.primary}/></div>
              <div style={{flex:1}}>
                <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>
                  {s.dose} {s.unit}
                  {s.unit!=='mg'&&<span style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginLeft:6}}>= {mgEff.toFixed(2)} mg</span>}
                  {' · '}{s.site}
                </div>
                <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.05em',marginTop:2}}>{fmtDate(s.date,{weekday:'short',month:'short',day:'numeric'}).toUpperCase()}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>{Math.max(0,Math.ceil((NOW-new Date(s.date))/86400000))}d ago</div>
                <Icons.Edit size={13} color={p.inkMuted}/>
              </div>
            </button>;
          })}
        </Card>
      </div>
    </>}
    {editingShot&&<Portal><EditShotSheet p={p} shot={editingShot} med={med} onSave={handleEditSave} onDelete={handleDelete} onClose={()=>setEditingShot(null)}/></Portal>}
  </div>;
}

// ═══════════════════════════════════════════════
// SCREEN: LEVELS
// ═══════════════════════════════════════════════
function ScreenLevels({p,store,onUpdate,onUndo}){
  const [range,setRange]=React.useState(28);
  const [editingShot,setEditingShot]=React.useState(null);
  const [probe,setProbe]=React.useState(null); // {x,t,lvl} tap-to-read
  const NOW=Date.now();
  const futureDays=14;
  const W=358,H=200,padL=8,padR=8,padT=12,padB=24,plotW=W-padL-padR,plotH=H-padT-padB;
  const med=store.meds[0];
  const shots=med?store.shots.filter(s=>s.medId===med.id).map(s=>({...s,dose:effectiveMg(s,med)})):[];
  const pastDays=range,totalDays=pastDays+futureDays,steps=80;
  const pts=[];
  for(let i=0;i<=steps;i++){
    const t=NOW-pastDays*86400000+(i/steps)*totalDays*86400000;
    pts.push({t,lvl:med?totalLevel(shots,med.halfLifeDays,med.tmaxDays,t):0});
  }
  const maxLvl=Math.max(...pts.map(p=>p.lvl),0.1)*1.15;
  const xOf=t=>padL+((t-(NOW-pastDays*86400000))/(totalDays*86400000))*plotW;
  const yOf=v=>padT+plotH-(v/maxLvl)*plotH;
  const linePath=pts.map((pt,i)=>`${i===0?'M':'L'} ${xOf(pt.t).toFixed(2)} ${yOf(pt.lvl).toFixed(2)}`).join(' ');
  const areaPath=linePath+` L ${xOf(pts[pts.length-1].t).toFixed(2)} ${padT+plotH} L ${xOf(pts[0].t).toFixed(2)} ${padT+plotH} Z`;
  const nowX=xOf(NOW);
  const currentLvl=getCurrentLevel(store,NOW);
  const next=nextShotDate(store,NOW);
  const trough=next&&med?totalLevel(shots,med.halfLifeDays,med.tmaxDays,next.getTime()-60000):0;
  const xLabels=[];
  for(let d=-pastDays;d<=futureDays;d+=Math.ceil(totalDays/6))xLabels.push({x:xOf(NOW+d*86400000),label:d===0?'Now':d<0?`${d}d`:`+${d}d`,isNow:d===0});
  const recentShots=store.shots.filter(s=>{const t=new Date(s.date).getTime();return t>=NOW-pastDays*86400000&&t<=NOW+futureDays*86400000;});
  const ladder=titrationSteps(store.shots,med);

  function readProbe(e){
    const svg=e.currentTarget.ownerSVGElement||e.currentTarget;
    const rect=svg.getBoundingClientRect();
    const clientX=e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX;
    let vbX=((clientX-rect.left)/rect.width)*W;
    vbX=Math.max(padL,Math.min(W-padR,vbX));
    const t=(NOW-pastDays*86400000)+((vbX-padL)/plotW)*totalDays*86400000;
    const lvl=med?totalLevel(shots,med.halfLifeDays,med.tmaxDays,t):0;
    setProbe({x:vbX,t,lvl});
  }

  if(!med)return <div style={{padding:'40px 22px',fontFamily:TYPE.ui,color:p.inkSoft,textAlign:'center'}}><div style={{fontFamily:TYPE.display,fontSize:28,color:p.ink,marginBottom:8}}>No medication</div>Set up your medication in Settings to see your drug level forecast.</div>;

  return <div style={{padding:'8px 0 110px',fontFamily:TYPE.ui,background:p.bg,minHeight:'100%'}}>
    <ScreenHeader p={p} eyebrow="Pharmacokinetics" title={<>Drug <span style={{fontStyle:'italic'}}>at work</span></>} sub={`${med.name} active drug concentration`}/>
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p} padding={0} style={{overflow:'hidden'}}>
        <div style={{padding:'20px 22px 12px',display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div>
            <Eyebrow p={p}>Active right now</Eyebrow>
            <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:4}}>
              <span style={{fontFamily:TYPE.display,fontSize:52,color:p.ink,lineHeight:0.9,letterSpacing:'-0.03em'}}>{currentLvl.toFixed(2)}</span>
              <span style={{fontFamily:TYPE.ui,fontSize:14,color:p.inkSoft}}>mg</span>
            </div>
            <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginTop:4}}>{med.name} · {med.currentDose} {med.unit} cycle</div>
          </div>
        </div>
        <div style={{padding:'0 22px 8px',display:'flex',gap:6,flexWrap:'wrap'}}>
          {[14,28,60,90].map(d=><Chip key={d} p={p} active={range===d} onClick={()=>setRange(d)}>{d===90?'3 mo':`${d}d`}</Chip>)}
        </div>
        <div style={{padding:'0 14px 8px'}}>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`}>
            <defs>
              <linearGradient id="lvlFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={p.primary} stopOpacity="0.22"/><stop offset="100%" stopColor={p.primary} stopOpacity="0"/></linearGradient>
              <pattern id="dashFut" patternUnits="userSpaceOnUse" width="6" height="6"><line x1="0" y1="0" x2="6" y2="6" stroke={p.line} strokeWidth="0.5"/></pattern>
            </defs>
            {[0.25,0.5,0.75].map((g,i)=><line key={i} x1={padL} x2={W-padR} y1={padT+plotH*g} y2={padT+plotH*g} stroke={p.chartGrid} strokeWidth="0.5" strokeDasharray="3 4"/>)}
            <rect x={nowX} y={padT} width={W-padR-nowX} height={plotH} fill="url(#dashFut)"/>
            <path d={areaPath} fill="url(#lvlFill)"/>
            <path d={linePath} stroke={p.primary} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <line x1={nowX} x2={nowX} y1={padT-4} y2={padT+plotH} stroke={p.accent} strokeWidth="1" strokeDasharray="2 3"/>
            <circle cx={nowX} cy={yOf(currentLvl)} r="5" fill={p.accent}/>
            <circle cx={nowX} cy={yOf(currentLvl)} r="9" fill={p.accent} fillOpacity="0.18"/>
            <g transform={`translate(${nowX},${padT-8})`}><rect x="-22" y="-14" width="44" height="14" rx="7" fill={p.accent}/><text x="0" y="-3" fill="#fff" textAnchor="middle" style={{fontFamily:TYPE.mono,fontSize:9,fontWeight:600,letterSpacing:'0.1em'}}>NOW</text></g>
            {recentShots.map(s=>{const sx=xOf(new Date(s.date).getTime());return <g key={s.id}><line x1={sx} x2={sx} y1={padT+plotH-4} y2={padT+plotH+4} stroke={p.primary} strokeWidth="1.2"/><circle cx={sx} cy={padT+plotH+8} r="2" fill={p.primary}/></g>;})}
            {xLabels.map((l,i)=><text key={i} x={l.x} y={H-4} textAnchor="middle" fill={l.isNow?p.accent:p.inkMuted} style={{fontFamily:TYPE.mono,fontSize:9,fontWeight:l.isNow?600:400,letterSpacing:'0.08em'}}>{l.label.toUpperCase()}</text>)}
            {probe&&(()=>{const py=yOf(probe.lvl);const lblRight=probe.x>W/2;return <g><line x1={probe.x} x2={probe.x} y1={padT} y2={padT+plotH} stroke={p.ink} strokeWidth="0.75" strokeDasharray="2 2"/><circle cx={probe.x} cy={py} r="4" fill={p.ink} stroke={p.bgElev} strokeWidth="1.5"/><g transform={`translate(${probe.x},${Math.max(padT+18,py)})`}><rect x={lblRight?-84:4} y="-15" width="80" height="29" rx="6" fill={p.ink}/><text x={lblRight?-44:44} y="-3" textAnchor="middle" fill={p.bgElev} style={{fontFamily:TYPE.mono,fontSize:9,fontWeight:600}}>{probe.lvl.toFixed(2)} mg</text><text x={lblRight?-44:44} y="8" textAnchor="middle" fill={p.bgElev} fillOpacity="0.7" style={{fontFamily:TYPE.mono,fontSize:8}}>{fmtDate(probe.t,{month:'short',day:'numeric'}).toUpperCase()}</text></g></g>;})()}
            <rect x={padL} y={padT} width={plotW} height={plotH} fill="transparent" style={{touchAction:'none',cursor:'crosshair'}} onMouseDown={readProbe} onMouseMove={e=>{if(e.buttons)readProbe(e);}} onTouchStart={readProbe} onTouchMove={readProbe}/>
          </svg>
        </div>
        <div style={{padding:'0 22px 14px',fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,letterSpacing:'0.04em',textAlign:'center'}}>Tap or drag the chart to read the level at any point</div>
      </Card>
    </div>
    <div style={{padding:'0 16px 14px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
      {[{label:'Active now',v:currentLvl.toFixed(2),unit:'mg',color:p.primary},{label:'Trough',v:trough.toFixed(2),unit:'mg',color:p.weight},{label:'Half-life',v:med.halfLifeDays,unit:'d',color:p.accent}].map(t=>(
        <div key={t.label} style={{background:p.bgElev,border:`0.5px solid ${p.line}`,borderRadius:R.lg,padding:'14px'}}>
          <Eyebrow p={p} style={{marginBottom:6}}>{t.label}</Eyebrow>
          <div style={{display:'flex',alignItems:'baseline',gap:3}}><span style={{fontFamily:TYPE.display,fontSize:26,color:t.color,lineHeight:0.95,letterSpacing:'-0.025em'}}>{t.v}</span><span style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft}}>{t.unit}</span></div>
        </div>
      ))}
    </div>
    {ladder.length>1&&<div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:14}}>Dose titration</Eyebrow>
        <div style={{display:'flex',alignItems:'flex-end',gap:6,height:60,marginBottom:10}}>
          {ladder.map((st,i)=>{const maxMg=Math.max(...ladder.map(s=>s.mg))||1;const h=Math.max(0.16,st.mg/maxMg);return <div key={i} style={{flex:1,height:'100%',display:'flex',alignItems:'flex-end'}}><div style={{width:'100%',height:`${h*100}%`,background:i===ladder.length-1?p.primary:p.primarySoft,borderRadius:'4px 4px 0 0'}}/></div>;})}
        </div>
        <div style={{display:'flex',gap:6}}>
          {ladder.map((st,i)=>(<div key={i} style={{flex:1,textAlign:'center',minWidth:0}}>
            <div style={{fontFamily:TYPE.mono,fontSize:11,color:p.ink,fontWeight:600}}>{st.dose}{st.unit==='mg'?'mg':''}</div>
            {st.unit!=='mg'&&<div style={{fontFamily:TYPE.mono,fontSize:8,color:p.inkSoft}}>{st.unit}</div>}
            <div style={{fontFamily:TYPE.mono,fontSize:8,color:p.inkMuted,marginTop:2,letterSpacing:'0.02em'}}>{fmtDate(st.date,{month:'short',day:'numeric'}).toUpperCase()}</div>
          </div>))}
        </div>
        <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,marginTop:12,lineHeight:1.5}}>Each step marks the first day at that dose, read from your shot log.</div>
      </Card>
    </div>}
    {store.shots.length>0&&<><div style={{padding:'8px 22px 8px'}}><Eyebrow p={p}>Shot history</Eyebrow></div>
    <div style={{padding:'0 16px 16px'}}>
      <Card p={p} padding={0}>
        {[...store.shots].reverse().map((s,i,arr)=>{
          const mgEff=med?effectiveMg(s,med):s.dose;
          return <button key={s.id} onClick={()=>setEditingShot(s)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'14px 18px',borderBottom:i===arr.length-1?'none':`0.5px solid ${p.lineSoft}`,background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            <div style={{width:36,height:36,borderRadius:18,background:p.primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icons.Pill size={16} color={p.primary}/></div>
            <div style={{flex:1}}>
              <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>
                {s.dose} {s.unit}
                {s.unit!=='mg'&&<span style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginLeft:6}}>= {mgEff.toFixed(2)} mg</span>}
                {' · '}{s.site}
              </div>
              <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.05em',marginTop:2}}>{fmtDate(s.date,{weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase()}</div>
              {hasSymptoms(s.symptoms)&&<div style={{fontFamily:TYPE.mono,fontSize:9,color:p.weight,marginTop:3,letterSpacing:'0.02em'}}>{fmtSymptoms(s.symptoms)}{s.symptoms.note?(fmtSymptoms(s.symptoms)?' · ':'')+'“'+s.symptoms.note+'”':''}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>{Math.max(0,Math.ceil((NOW-new Date(s.date))/86400000))}d ago</div>
              <Icons.Edit size={13} color={p.inkMuted}/>
            </div>
          </button>;
        })}
      </Card>
    </div></>}
    {editingShot&&<Portal><EditShotSheet p={p} shot={editingShot} med={med}
      onSave={updated=>{const ns={...store,shots:store.shots.map(s=>s.id===updated.id?updated:s).sort((a,b)=>new Date(a.date)-new Date(b.date))};saveStore(ns);onUpdate(ns);setEditingShot(null);}}
      onDelete={id=>{const prev=store;const ns={...store,shots:store.shots.filter(s=>s.id!==id)};saveStore(ns);onUpdate(ns);setEditingShot(null);onUndo&&onUndo('Shot deleted',()=>{saveStore(prev);onUpdate(prev);});}}
      onClose={()=>setEditingShot(null)}/></Portal>}
  </div>;
}

// ═══════════════════════════════════════════════
// PEPTIDE LOG SHEET  (date + time = backdating + accurate PK; log on any day)
// ═══════════════════════════════════════════════
function PeptideLogSheet({p,peptide:pt,existingLog,onSave,onDelete,onClose}){
  const today=localToday();
  const isEdit=!!existingLog;
  const [dose,setDose]=React.useState(existingLog?.dose||pt.defaultDose);
  const [site,setSite]=React.useState(existingLog?.site||'');
  const [timing,setTiming]=React.useState(existingLog?.timing||pt.defaultTiming||'morning');
  const [date,setDate]=React.useState(existingLog?.date||today);
  const [time,setTime]=React.useState(existingLog?.time||nowTimeStr());
  const {handlers,panelStyle}=useDragToDismiss(onClose);

  return <div style={{position:'fixed',inset:0,zIndex:600,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)'}}/>
    <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 22px',paddingBottom:'max(36px,env(safe-area-inset-bottom))',maxHeight:'92vh',overflowY:'auto',...panelStyle}}>
      <div {...handlers} style={{padding:'2px 0 14px',margin:'-2px 0 2px',touchAction:'none',cursor:'grab'}}><div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto'}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{width:9,height:9,borderRadius:5,background:pt.color}}/>
          <div style={{fontFamily:TYPE.display,fontSize:24,color:p.ink}}>{isEdit?'Edit log':pt.name}</div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icons.X size={18} color={p.inkMuted}/></button>
      </div>
      <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:20}}>{pt.weeklyTarget}×/week · {pt.timingLabel}</div>

      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Date & time</Eyebrow>
        <div style={{display:'flex',gap:8}}>
          <input type="date" value={date} max={today} onChange={e=>setDate(e.target.value)} style={{flex:1,padding:'12px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:15,color:p.ink,outline:'none'}}/>
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{width:108,padding:'12px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:15,color:p.ink,outline:'none'}}/>
        </div>
        {date!==today&&<div style={{fontFamily:TYPE.mono,fontSize:10,color:p.accent,marginTop:6,letterSpacing:'0.04em'}}>Backdated to {fmtDate(date,{weekday:'short',month:'short',day:'numeric'})}</div>}
      </div>

      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Dose</Eyebrow>
        <div style={{display:'flex',gap:8}}>
          {pt.doseOptions.map(opt=>(
            <button key={opt} onClick={()=>setDose(opt)} style={{flex:1,padding:'14px 8px',borderRadius:R.md,background:dose===opt?p.ink:p.bgInset,color:dose===opt?p.bgElev:p.ink,border:`0.5px solid ${dose===opt?'transparent':p.line}`,cursor:'pointer',textAlign:'center'}}>
              <div style={{fontFamily:TYPE.display,fontSize:22,lineHeight:0.9}}>{opt}<span style={{fontSize:12,opacity:0.7}}> u</span></div>
              <div style={{fontFamily:TYPE.mono,fontSize:10,color:dose===opt?p.bgElev+'99':p.inkMuted,marginTop:4}}>{fmtDose(opt,pt)}</div>
            </button>
          ))}
        </div>
        <div style={{marginTop:8,padding:'8px 12px',background:p.bgInset,borderRadius:R.md,fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted}}>{pt.doseLabel}</div>
      </div>

      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Timing</Eyebrow>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {TIMING_OPTIONS.map(t=>(
            <button key={t.value} onClick={()=>setTiming(t.value)} style={{padding:'8px 14px',borderRadius:R.pill,background:timing===t.value?p.ink:p.bgInset,color:timing===t.value?p.bgElev:p.ink,border:`0.5px solid ${timing===t.value?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:22}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Injection site</Eyebrow>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {INJECTION_SITES.map(s=>(
            <button key={s} onClick={()=>setSite(s)} style={{padding:'7px 12px',borderRadius:R.pill,background:site===s?p.ink:p.bgInset,color:site===s?p.bgElev:p.ink,border:`0.5px solid ${site===s?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer',whiteSpace:'nowrap'}}>{s}</button>
          ))}
        </div>
      </div>

      <PillBtn p={p} kind="primary" size="lg" style={{width:'100%'}} icon={<Icons.Check size={18} color={p.bgElev}/>}
        onClick={()=>onSave({peptideId:pt.id,dose,site,timing,date,time})}>
        {isEdit?'Save changes':`Log ${fmtDose(dose,pt)}`}
      </PillBtn>
      {isEdit&&<button onClick={()=>onDelete(existingLog.id)} style={{width:'100%',marginTop:10,padding:'13px',borderRadius:R.pill,background:'none',border:`0.5px solid ${p.line}`,color:p.accent,fontFamily:TYPE.ui,fontSize:14,cursor:'pointer'}}>Delete log</button>}
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// PEPTIDE SCHEDULE + REMINDER SHEET
// Edit which days a peptide is planned, set a reminder time, export an .ics
// calendar event with a native alert (no backend needed for reliable reminders).
// ═══════════════════════════════════════════════
function PeptideScheduleSheet({p,peptide:pt,onSaveDays,onSaveTime,onActivate,onReset,onLogNow,onClose}){
  const [days,setDays]=React.useState((pt.scheduleDays||[]).slice());
  const [time,setTime]=React.useState(pt.reminderTime||'08:00');
  const {handlers,panelStyle}=useDragToDismiss(onClose);
  const order=[1,2,3,4,5,6,0]; // Mon-first
  function toggle(d){setDays(ds=>ds.includes(d)?ds.filter(x=>x!==d):[...ds,d].sort((a,b)=>a-b));}
  function commit(){onSaveDays(days);onSaveTime(time);}
  function addReminder(){
    commit();
    const fakeMed={id:`pep-${pt.id}`,name:pt.name,currentDose:pt.defaultDose,unit:'u',scheduleDays:days};
    downloadFile(generateICS(fakeMed,time),`vital-${pt.id}-reminder.ics`,'text/calendar');
  }
  const summary=days.length===7?'Every day':days.length?days.slice().sort((a,b)=>a-b).map(d=>FULLDAYS[d]).join(', '):'No days selected';

  return <div style={{position:'fixed',inset:0,zIndex:600,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)'}}/>
    <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 22px',paddingBottom:'max(36px,env(safe-area-inset-bottom))',maxHeight:'92vh',overflowY:'auto',...panelStyle}}>
      <div {...handlers} style={{padding:'2px 0 14px',margin:'-2px 0 2px',touchAction:'none',cursor:'grab'}}><div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto'}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{width:9,height:9,borderRadius:5,background:pt.color}}/>
          <div style={{fontFamily:TYPE.display,fontSize:24,color:p.ink}}>{pt.name}</div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icons.X size={18} color={p.inkMuted}/></button>
      </div>
      <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:20}}>Schedule &amp; reminder</div>

      {pt.upcoming&&<div style={{background:`${pt.color}14`,border:`0.5px solid ${pt.color}55`,borderRadius:R.md,padding:'12px 14px',marginBottom:18}}>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.ink,lineHeight:1.5}}>Not in your active stack yet{pt.startNote?` — ${pt.startNote}`:''}. Set its days below, then activate it to add it to your daily protocol.</div>
        <button onClick={()=>{commit();onActivate();}} style={{marginTop:10,padding:'9px 16px',borderRadius:R.pill,background:pt.color,color:'#fff',border:'none',fontFamily:TYPE.ui,fontSize:13,fontWeight:600,cursor:'pointer'}}>Activate now</button>
      </div>}

      <div style={{marginBottom:18}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Planned days</Eyebrow>
        <div style={{display:'flex',gap:5}}>
          {order.map(d=>(
            <button key={d} onClick={()=>toggle(d)} style={{flex:1,padding:'12px 2px',borderRadius:R.md,background:days.includes(d)?pt.color:p.bgInset,color:days.includes(d)?'#fff':p.ink,border:`0.5px solid ${days.includes(d)?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>{DAYS[d][0]}</button>
          ))}
        </div>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginTop:8}}>{summary}</div>
        <div style={{display:'flex',gap:8,marginTop:10}}>
          <button onClick={()=>setDays([0,1,2,3,4,5,6])} style={{flex:1,padding:'8px',borderRadius:R.md,background:p.bgInset,border:`0.5px solid ${p.line}`,color:p.inkSoft,fontFamily:TYPE.mono,fontSize:10,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer'}}>Every day</button>
          <button onClick={()=>setDays([1,2,3,4,5])} style={{flex:1,padding:'8px',borderRadius:R.md,background:p.bgInset,border:`0.5px solid ${p.line}`,color:p.inkSoft,fontFamily:TYPE.mono,fontSize:10,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer'}}>Mon–Fri</button>
          <button onClick={()=>setDays([1,3,5])} style={{flex:1,padding:'8px',borderRadius:R.md,background:p.bgInset,border:`0.5px solid ${p.line}`,color:p.inkSoft,fontFamily:TYPE.mono,fontSize:10,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer'}}>M/W/F</button>
        </div>
      </div>

      <div style={{marginBottom:20}}>
        <Eyebrow p={p} style={{marginBottom:8}}>Reminder time</Eyebrow>
        <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{width:'100%',padding:'12px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:15,color:p.ink,outline:'none'}}/>
      </div>

      <PillBtn p={p} kind="primary" size="lg" style={{width:'100%'}} icon={<Icons.Clock size={17} color={p.bgElev}/>}
        onClick={addReminder} disabled={!days.length}>
        Add reminder to Calendar
      </PillBtn>
      <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,lineHeight:1.5,margin:'10px 2px 0',textAlign:'center'}}>
        Downloads a repeating calendar event with a native alert at {time} on your selected days. (Phone push without a server isn't reliable — the calendar alarm is.)
      </div>

      <div style={{display:'flex',gap:8,marginTop:14}}>
        <button onClick={()=>{commit();onClose();}} style={{flex:1,padding:'13px',borderRadius:R.pill,background:p.bgInset,border:`0.5px solid ${p.line}`,color:p.ink,fontFamily:TYPE.ui,fontSize:14,fontWeight:500,cursor:'pointer'}}>Save schedule</button>
        <button onClick={onLogNow} style={{flex:1,padding:'13px',borderRadius:R.pill,background:p.ink,border:'none',color:p.bgElev,fontFamily:TYPE.ui,fontSize:14,fontWeight:500,cursor:'pointer'}}>Log a dose</button>
      </div>
      <button onClick={()=>{onReset();onClose();}} style={{width:'100%',marginTop:10,padding:'11px',borderRadius:R.pill,background:'none',border:'none',color:p.inkMuted,fontFamily:TYPE.ui,fontSize:12,cursor:'pointer'}}>Reset to protocol default</button>
    </div>
  </div>;
}
