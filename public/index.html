// SCREEN: PEPTIDES  (Today · Levels · History)
// ═══════════════════════════════════════════════
function ScreenPeptides({p,openLogFor,onConsumeOpen,onUndo}){
  const [sched,setSched]=React.useState(()=>loadPeptideSched());
  const allPeptides=React.useMemo(()=>mergePeptides(sched),[sched]);
  const peptides=allPeptides.filter(pt=>!pt.upcoming);          // active stack
  const upcomingPeptides=allPeptides.filter(pt=>pt.upcoming);   // "starting soon"
  const [logs,setLogs]=React.useState(()=>loadPeptideLogs());
  const [subView,setSubView]=React.useState('today');
  const [logSheet,setLogSheet]=React.useState(null);   // peptideId for a NEW log
  const [editLog,setEditLog]=React.useState(null);     // existing log object
  const [schedSheet,setSchedSheet]=React.useState(null); // peptideId for schedule editor
  const [weekOffset,setWeekOffset]=React.useState(0);
  const [selPeptide,setSelPeptide]=React.useState((peptides[0]||allPeptides[0]).id);

  React.useEffect(()=>{savePeptideLogs(logs);},[logs]);
  React.useEffect(()=>{savePeptideSched(sched);},[sched]);
  React.useEffect(()=>{
    if(openLogFor){setSubView('today');setLogSheet(openLogFor);onConsumeOpen&&onConsumeOpen();}
  },[openLogFor]);

  const today=localToday();

  function handleSaveLog(entry){
    if(editLog){setLogs(ls=>ls.map(l=>l.id===editLog.id?{...l,...entry}:l));setEditLog(null);}
    else{setLogs(ls=>[{id:`p_${Date.now()}`,...entry},...ls]);setLogSheet(null);}
  }
  function handleDeleteLog(id){const prev=logs;setLogs(ls=>ls.filter(l=>l.id!==id));setEditLog(null);onUndo&&onUndo('Log deleted',()=>setLogs(prev));}
  function takenToday(pid){return logs.some(l=>l.peptideId===pid&&l.date===today);}
  function saveSchedFor(pid,patch){setSched(s=>({...s,[pid]:{...(s[pid]||{}),...patch}}));}
  function resetSchedFor(pid){setSched(s=>{const n={...s};delete n[pid];return n;});}

  // -- TODAY --
  function TodayView(){
    return <div style={{padding:'0 16px 110px'}}>
      <div style={{padding:'0 6px 14px'}}>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,lineHeight:1.5}}>
          Tap any peptide to log a dose — on a scheduled day or not. Forgot one? Backdate it with the date picker.
        </div>
      </div>
      {peptides.map(pt=>{
        const taken=takenToday(pt.id);
        const todayLog=logs.find(l=>l.peptideId===pt.id&&l.date===today);
        const count=getWeeklyCount(logs,pt.id,0);
        const pct=Math.min(1,count/pt.weeklyTarget);
        const scheduledToday=isScheduledOn(pt,today);
        const dayLabel=pt.scheduleDays.length===7?'Daily':pt.scheduleDays.length?pt.scheduleDays.slice().sort((a,b)=>a-b).map(d=>DAYS[d]).join(' · '):'No set days';
        return <div key={pt.id} style={{background:p.bgElev,border:`0.5px solid ${p.line}`,borderRadius:R.lg,padding:18,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
            <div style={{minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:9,height:9,borderRadius:5,background:pt.color,flexShrink:0}}/>
                <div style={{fontFamily:TYPE.display,fontSize:20,color:p.ink,letterSpacing:'-0.015em'}}>{pt.name}</div>
              </div>
              <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.08em',textTransform:'uppercase',marginTop:3}}>{dayLabel} · {pt.timingLabel}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <div style={{padding:'4px 10px',borderRadius:R.pill,background:taken?pt.color:scheduledToday?`${p.accent}22`:p.bgInset,border:`0.5px solid ${taken?'transparent':scheduledToday?'transparent':p.line}`}}>
                <span style={{fontFamily:TYPE.mono,fontSize:10,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:taken?'#fff':scheduledToday?p.accent:p.inkSoft}}>
                  {taken?'✓ Logged':scheduledToday?'Due today':'Rest day'}
                </span>
              </div>
              <button onClick={()=>setSchedSheet(pt.id)} aria-label="Edit schedule" style={{width:30,height:30,borderRadius:15,background:p.bgInset,border:`0.5px solid ${p.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                <Icons.Gear size={14} color={p.inkSoft}/>
              </button>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
            <div style={{position:'relative',width:48,height:48,flexShrink:0}}>
              <svg width={48} height={48} style={{transform:'rotate(-90deg)'}}>
                <circle cx={24} cy={24} r={19} stroke={p.bgInset} strokeWidth={5} fill="none"/>
                <circle cx={24} cy={24} r={19} stroke={taken?pt.color:p.line} strokeWidth={5} fill="none" strokeLinecap="round" strokeDasharray={`${2*Math.PI*19*(taken?1:0)} ${2*Math.PI*19}`} style={{transition:'stroke-dasharray 0.8s cubic-bezier(0.3,0.7,0.3,1)'}}/>
              </svg>
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:TYPE.mono,fontSize:11,color:taken?pt.color:p.inkMuted}}>{taken?'✓':'—'}</span>
              </div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <Eyebrow p={p} style={{marginBottom:3}}>Default dose</Eyebrow>
              <div style={{display:'flex',alignItems:'baseline',gap:4,flexWrap:'wrap'}}>
                <span style={{fontFamily:TYPE.display,fontSize:26,color:p.ink,lineHeight:0.9}}>{pt.defaultDose}</span>
                <span style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>units</span>
                <span style={{fontFamily:TYPE.mono,fontSize:11,color:p.inkMuted,marginLeft:4}}>= {fmtDose(pt.defaultDose,pt)}</span>
              </div>
              {todayLog&&<div style={{fontFamily:TYPE.mono,fontSize:10,color:pt.color,marginTop:4,letterSpacing:'0.04em'}}>
                Logged {fmtDose(todayLog.dose,pt)}{todayLog.time?` · ${todayLog.time}`:''}{todayLog.site?` · ${todayLog.site}`:''}
              </div>}
            </div>
          </div>

          <div style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <Eyebrow p={p}>This week</Eyebrow>
              <span style={{fontFamily:TYPE.mono,fontSize:11,color:pct>=1?p.success:p.ink}}>{count}/{pt.weeklyTarget} doses</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1,height:5,borderRadius:3,background:p.bgInset,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct*100}%`,borderRadius:3,background:pct>=1?pt.color:pct>0.5?p.accent:p.warn,transition:'width 0.5s'}}/>
              </div>
              <span style={{fontFamily:TYPE.mono,fontSize:11,color:p.inkMuted,minWidth:34,textAlign:'right'}}>{Math.round(pct*100)}%</span>
            </div>
          </div>

          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setLogSheet(pt.id)} style={{flex:1,padding:'12px',borderRadius:R.pill,background:p.ink,color:p.bgElev,border:'none',fontFamily:TYPE.ui,fontSize:13,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <Icons.Plus size={14} color={p.bgElev}/> {taken?'Log another':`Log ${pt.name.split(' ')[0]}`}
            </button>
            {taken&&todayLog&&<button onClick={()=>setEditLog(todayLog)} style={{padding:'12px 16px',borderRadius:R.pill,background:p.bgInset,color:p.inkSoft,border:`0.5px solid ${p.line}`,fontFamily:TYPE.ui,fontSize:13,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
              <Icons.Edit size={14} color={p.inkSoft}/> Edit
            </button>}
          </div>
        </div>;
      })}

      {upcomingPeptides.length>0&&<div style={{marginTop:6}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px 10px'}}>
          <Eyebrow p={p}>Starting soon</Eyebrow>
          <div style={{flex:1,height:'0.5px',background:p.line}}/>
        </div>
        {upcomingPeptides.map(pt=>(
          <div key={pt.id} style={{background:p.bgInset,border:`0.5px dashed ${p.line}`,borderRadius:R.lg,padding:'14px 16px',marginBottom:10,display:'flex',alignItems:'center',gap:12,opacity:0.92}}>
            <span style={{width:9,height:9,borderRadius:5,background:pt.color,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:TYPE.ui,fontSize:14,fontWeight:500,color:p.ink}}>{pt.name}</div>
              <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.04em',marginTop:2}}>{pt.startNote||'Not started'}</div>
            </div>
            <button onClick={()=>setSchedSheet(pt.id)} style={{padding:'8px 14px',borderRadius:R.pill,background:p.bgElev,border:`0.5px solid ${p.line}`,color:p.ink,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>Set up</button>
          </div>
        ))}
      </div>}
    </div>;
  }
  function LevelsView(){
    const pt=peptides.find(x=>x.id===selPeptide);
    const now=Date.now();
    const ptLogs=logs.filter(l=>l.peptideId===pt.id);
    const injTimes=ptLogs.map(l=>logInjectionMs(l,pt)).sort((a,b)=>a-b);
    const lastInj=injTimes.length?injTimes[injTimes.length-1]:now;
    let startMs,endMs;
    if(pt.dayScale){startMs=now-pt.chartHours*3600000;endMs=now+48*3600000;}
    else{
      const decayH=Math.max(10,Math.ceil(10*pt.halfLifeHours));
      startMs=Math.min(lastInj-3600000,now-2*3600000);
      endMs=Math.max(lastInj+decayH*3600000,now+3600000);
    }
    const span=endMs-startMs||1;
    const W=358,H=200,padL=8,padR=8,padT=14,padB=24,plotW=W-padL-padR,plotH=H-padT-padB;
    const steps=90;
    const cpts=[];
    for(let i=0;i<=steps;i++){const t=startMs+(i/steps)*span;cpts.push({t,lvl:peptideLevelAt(logs,pt,t)});}
    const maxLvl=Math.max(...cpts.map(x=>x.lvl),1e-9)*1.18;
    const xOf=t=>padL+((t-startMs)/span)*plotW;
    const yOf=v=>padT+plotH-(v/maxLvl)*plotH;
    const linePath=cpts.map((c,i)=>`${i===0?'M':'L'} ${xOf(c.t).toFixed(2)} ${yOf(c.lvl).toFixed(2)}`).join(' ');
    const areaPath=linePath+` L ${xOf(endMs).toFixed(2)} ${padT+plotH} L ${xOf(startMs).toFixed(2)} ${padT+plotH} Z`;
    const nowX=xOf(now);
    const curLvl=peptideLevelAt(logs,pt,now);
    const marks=ptLogs.map(l=>logInjectionMs(l,pt)).filter(t=>t>=startMs&&t<=endMs);
    const labels=[];
    const nLab=6;
    for(let i=0;i<=nLab;i++){
      const t=startMs+(i/nLab)*span;const relH=(t-now)/3600000;let lab,isNow;
      if(pt.dayScale){const dd=Math.round(relH/24);lab=dd===0?'NOW':(dd>0?`+${dd}D`:`${dd}D`);isNow=Math.abs(relH)<12;}
      else{const h=Math.round(relH);lab=h===0?'NOW':(h>0?`+${h}H`:`${h}H`);isNow=Math.abs(relH)<0.5;}
      labels.push({x:xOf(t),lab,isNow});
    }
    const lastLog=ptLogs.slice().sort((a,b)=>logInjectionMs(b,pt)-logInjectionMs(a,pt))[0];
    const hoursSince=lastLog?((now-logInjectionMs(lastLog,pt))/3600000):null;
    const count=getWeeklyCount(logs,pt.id,0);
    const [pProbe,setPProbe]=React.useState(null);
    function readPProbe(e){
      const svg=e.currentTarget.ownerSVGElement||e.currentTarget;
      const rect=svg.getBoundingClientRect();
      const clientX=e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX;
      let vbX=((clientX-rect.left)/rect.width)*W;vbX=Math.max(padL,Math.min(W-padR,vbX));
      const t=startMs+((vbX-padL)/plotW)*span;
      setPProbe({x:vbX,t,lvl:peptideLevelAt(logs,pt,t)});
    }
    React.useEffect(()=>{setPProbe(null);},[selPeptide]);

    if(pt.blend){
      return <div style={{padding:'0 16px 110px'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
          {peptides.map(x=>{const on=x.id===selPeptide;return <button key={x.id} onClick={()=>setSelPeptide(x.id)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 12px',borderRadius:R.pill,background:on?x.color:'transparent',color:on?'#fff':p.ink,border:`0.5px solid ${on?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>
            <span style={{width:7,height:7,borderRadius:4,background:on?'#fff':x.color}}/>{x.name.split(' ')[0]}
          </button>;})}
        </div>
        <Card p={p} padding={20}>
          <div style={{display:'flex',gap:10}}>
            <div style={{flexShrink:0,marginTop:1}}><Icons.Flask size={16} color={pt.color}/></div>
            <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.inkSoft,lineHeight:1.55}}>{pt.levelNote}</div>
          </div>
          <div style={{marginTop:14,fontFamily:TYPE.mono,fontSize:11,color:p.inkMuted}}>{getWeeklyCount(logs,pt.id,0)} dose{getWeeklyCount(logs,pt.id,0)===1?'':'s'} logged this week · doses still show in History.</div>
        </Card>
      </div>;
    }

    return <div style={{padding:'0 16px 110px'}}>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        {peptides.map(x=>{const on=x.id===selPeptide;return <button key={x.id} onClick={()=>setSelPeptide(x.id)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 12px',borderRadius:R.pill,background:on?x.color:'transparent',color:on?'#fff':p.ink,border:`0.5px solid ${on?'transparent':p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}>
          <span style={{width:7,height:7,borderRadius:4,background:on?'#fff':x.color}}/>{x.name.split(' ')[0]}
        </button>;})}
      </div>

      <Card p={p} padding={0} style={{overflow:'hidden'}}>
        <div style={{padding:'18px 20px 4px'}}>
          <Eyebrow p={p}>Estimated in system</Eyebrow>
          <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:4}}>
            <span style={{fontFamily:TYPE.display,fontSize:48,color:pt.color,lineHeight:0.9,letterSpacing:'-0.03em'}}>{fmtLevelVal(curLvl,pt)}</span>
            <span style={{fontFamily:TYPE.ui,fontSize:14,color:p.inkSoft}}>{pt.doseUnit}</span>
          </div>
          <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginTop:4}}>
            {hoursSince==null?'No doses logged yet':hoursSince<1?'Last dose under an hour ago':hoursSince<48?`Last dose ${Math.round(hoursSince)} h ago`:`Last dose ${Math.round(hoursSince/24)} d ago`}
          </div>
        </div>
        <div style={{padding:'0 14px 8px'}}>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`}>
            <defs>
              <linearGradient id="pepFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={pt.color} stopOpacity="0.24"/><stop offset="100%" stopColor={pt.color} stopOpacity="0"/></linearGradient>
              <pattern id="pepDashFut" patternUnits="userSpaceOnUse" width="6" height="6"><line x1="0" y1="0" x2="6" y2="6" stroke={p.line} strokeWidth="0.5"/></pattern>
            </defs>
            {[0.25,0.5,0.75].map((g,i)=><line key={i} x1={padL} x2={W-padR} y1={padT+plotH*g} y2={padT+plotH*g} stroke={p.chartGrid} strokeWidth="0.5" strokeDasharray="3 4"/>)}
            {nowX<W-padR&&<rect x={Math.max(padL,nowX)} y={padT} width={Math.max(0,W-padR-Math.max(padL,nowX))} height={plotH} fill="url(#pepDashFut)"/>}
            <path d={areaPath} fill="url(#pepFill)"/>
            <path d={linePath} stroke={pt.color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            {nowX>=padL&&nowX<=W-padR&&<><line x1={nowX} x2={nowX} y1={padT-4} y2={padT+plotH} stroke={p.accent} strokeWidth="1" strokeDasharray="2 3"/>
            <circle cx={nowX} cy={yOf(curLvl)} r="5" fill={p.accent}/>
            <circle cx={nowX} cy={yOf(curLvl)} r="9" fill={p.accent} fillOpacity="0.18"/>
            <g transform={`translate(${Math.min(Math.max(nowX,22),W-22)},${padT-8})`}><rect x="-22" y="-14" width="44" height="14" rx="7" fill={p.accent}/><text x="0" y="-3" fill="#fff" textAnchor="middle" style={{fontFamily:TYPE.mono,fontSize:9,fontWeight:600,letterSpacing:'0.1em'}}>NOW</text></g></>}
            {marks.map((t,i)=>{const sx=xOf(t);return <g key={i}><line x1={sx} x2={sx} y1={padT+plotH-4} y2={padT+plotH+4} stroke={pt.color} strokeWidth="1.2"/><circle cx={sx} cy={padT+plotH+8} r="2" fill={pt.color}/></g>;})}
            {labels.map((l,i)=><text key={i} x={Math.min(Math.max(l.x,12),W-12)} y={H-4} textAnchor="middle" fill={l.isNow?p.accent:p.inkMuted} style={{fontFamily:TYPE.mono,fontSize:9,fontWeight:l.isNow?600:400,letterSpacing:'0.06em'}}>{l.lab}</text>)}
            {pProbe&&(()=>{const py=yOf(pProbe.lvl);const lblRight=pProbe.x>W/2;const relH=(pProbe.t-now)/3600000;const rl=pt.dayScale?`${relH>=0?'+':''}${Math.round(relH/24)}d`:`${relH>=0?'+':''}${Math.round(relH)}h`;return <g><line x1={pProbe.x} x2={pProbe.x} y1={padT} y2={padT+plotH} stroke={p.ink} strokeWidth="0.75" strokeDasharray="2 2"/><circle cx={pProbe.x} cy={py} r="4" fill={p.ink} stroke={p.bgElev} strokeWidth="1.5"/><g transform={`translate(${pProbe.x},${Math.max(padT+18,py)})`}><rect x={lblRight?-86:4} y="-15" width="82" height="29" rx="6" fill={p.ink}/><text x={lblRight?-45:45} y="-3" textAnchor="middle" fill={p.bgElev} style={{fontFamily:TYPE.mono,fontSize:9,fontWeight:600}}>{fmtLevelVal(pProbe.lvl,pt)} {pt.doseUnit}</text><text x={lblRight?-45:45} y="8" textAnchor="middle" fill={p.bgElev} fillOpacity="0.7" style={{fontFamily:TYPE.mono,fontSize:8}}>{rl} from now</text></g></g>;})()}
            <rect x={padL} y={padT} width={plotW} height={plotH} fill="transparent" style={{touchAction:'none',cursor:'crosshair'}} onMouseDown={readPProbe} onMouseMove={e=>{if(e.buttons)readPProbe(e);}} onTouchStart={readPProbe} onTouchMove={readPProbe}/>
          </svg>
        </div>
        <div style={{padding:'0 20px 14px',fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,letterSpacing:'0.04em',textAlign:'center'}}>Tap or drag to read the estimated level at any point</div>
      </Card>

      <div style={{padding:'14px 0 0',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        {[
          {label:'In system',v:fmtLevelVal(curLvl,pt),unit:pt.doseUnit,color:pt.color},
          {label:'Half-life',v:fmtHL(pt.halfLifeHours),unit:'',color:p.weight},
          {label:'This week',v:`${count}/${pt.weeklyTarget}`,unit:'',color:p.accent},
        ].map(t=>(
          <div key={t.label} style={{background:p.bgElev,border:`0.5px solid ${p.line}`,borderRadius:R.lg,padding:'14px'}}>
            <Eyebrow p={p} style={{marginBottom:6}}>{t.label}</Eyebrow>
            <div style={{display:'flex',alignItems:'baseline',gap:3}}><span style={{fontFamily:TYPE.display,fontSize:t.v.length>4?20:26,color:t.color,lineHeight:0.95,letterSpacing:'-0.025em'}}>{t.v}</span>{t.unit&&<span style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft}}>{t.unit}</span>}</div>
          </div>
        ))}
      </div>

      <div style={{marginTop:14}}>
        <Card p={p} padding={14} soft>
          <div style={{display:'flex',gap:10}}>
            <div style={{flexShrink:0,marginTop:1}}><Icons.Clock size={15} color={pt.color}/></div>
            <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,lineHeight:1.55}}>{pt.levelNote}</div>
          </div>
        </Card>
      </div>
      <div style={{padding:'10px 6px 0',fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,lineHeight:1.5}}>
        Curves are estimates from published half-lives, modeled per dose with first-order absorption &amp; elimination. Not a clinical measurement.
      </div>
    </div>;
  }

  // -- HISTORY --
  function HistoryView(){
    const weekDates=getWeekDates(weekOffset);
    const weekStart=fmtDate(weekDates[0]);
    const weekEnd=fmtDate(weekDates[6]);
    const DAY_ABBR=['Mo','Tu','We','Th','Fr','Sa','Su'];

    return <div style={{padding:'0 16px 110px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <button onClick={()=>setWeekOffset(w=>w-1)} style={{padding:'8px 12px',borderRadius:R.md,background:p.bgElev,border:`0.5px solid ${p.line}`,cursor:'pointer',color:p.inkSoft,fontFamily:TYPE.ui,fontSize:14}}>‹</button>
        <span style={{fontFamily:TYPE.mono,fontSize:11,color:p.inkMuted,textTransform:'uppercase',letterSpacing:'0.08em'}}>
          {weekOffset===0?'This week':weekOffset===-1?'Last week':`${weekStart} – ${weekEnd}`}
        </span>
        <button onClick={()=>setWeekOffset(w=>Math.min(w+1,0))} style={{padding:'8px 12px',borderRadius:R.md,background:p.bgElev,border:`0.5px solid ${p.line}`,cursor:'pointer',color:weekOffset<0?p.inkSoft:p.line,fontFamily:TYPE.ui,fontSize:14}}>›</button>
      </div>

      <div style={{background:p.bgElev,border:`0.5px solid ${p.line}`,borderRadius:R.lg,padding:'14px 14px 10px',marginBottom:14}}>
        <div style={{display:'flex',gap:14,marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:10,height:10,borderRadius:5,background:p.inkMuted}}/>
            <span style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,textTransform:'uppercase',letterSpacing:'0.05em'}}>Logged</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:10,height:10,borderRadius:5,background:'transparent',boxShadow:`0 0 0 2px ${p.accent}`}}/>
            <span style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,textTransform:'uppercase',letterSpacing:'0.05em'}}>Today</span>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'78px repeat(7,1fr)',gap:3,marginBottom:6}}>
          <div/>
          {weekDates.map((date,i)=>{
            const d=new Date(date+'T12:00:00');
            const isToday=date===today;
            return <div key={date} style={{textAlign:'center'}}>
              <div style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,textTransform:'uppercase',letterSpacing:'0.04em'}}>{DAY_ABBR[i]}</div>
              <div style={{fontFamily:TYPE.mono,fontSize:10,color:isToday?p.accent:p.inkMuted,fontWeight:isToday?600:400}}>{d.getDate()}</div>
            </div>;
          })}
        </div>
        {peptides.map(pt=>(
          <div key={pt.id} style={{display:'grid',gridTemplateColumns:'78px repeat(7,1fr)',gap:3,alignItems:'center',marginBottom:5}}>
            <div style={{display:'flex',alignItems:'center',gap:5,minWidth:0}}>
              <span style={{width:7,height:7,borderRadius:4,background:pt.color,flexShrink:0}}/>
              <span style={{fontFamily:TYPE.ui,fontSize:10,color:p.inkSoft,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{pt.name.split(' ')[0]}</span>
            </div>
            {weekDates.map(date=>{
              const taken=logs.some(l=>l.peptideId===pt.id&&l.date===date);
              const isToday=date===today;
              const future=date>today;
              return <div key={date} style={{width:24,height:24,borderRadius:12,margin:'0 auto',background:taken?pt.color:future?'transparent':p.bgInset,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:isToday?`0 0 0 2px ${p.accent}`:'none'}}>
                {taken&&<span style={{fontSize:9,color:'#fff',opacity:0.95}}>✓</span>}
              </div>;
            })}
          </div>
        ))}
      </div>

      <Eyebrow p={p} style={{marginBottom:10}}>Adherence this week</Eyebrow>
      {peptides.map(pt=>{
        const count=getWeeklyCount(logs,pt.id,weekOffset);
        const pct=Math.min(1,count/pt.weeklyTarget);
        return <div key={pt.id} style={{background:p.bgElev,border:`0.5px solid ${p.line}`,borderRadius:R.lg,padding:'12px 14px',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:8,height:8,borderRadius:4,background:pt.color}}/>
              <span style={{fontFamily:TYPE.ui,fontSize:14,color:p.ink,fontWeight:500}}>{pt.name}</span>
            </div>
            <span style={{fontFamily:TYPE.display,fontSize:22,color:pt.color}}>{count}<span style={{fontSize:13,color:p.inkMuted}}>/{pt.weeklyTarget}</span></span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{flex:1,height:5,borderRadius:3,background:p.bgInset,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct*100}%`,borderRadius:3,background:pct>=1?pt.color:pct>=0.6?p.accent:p.warn}}/>
            </div>
            <span style={{fontFamily:TYPE.mono,fontSize:11,color:p.inkMuted,minWidth:32}}>{Math.round(pct*100)}%</span>
          </div>
        </div>;
      })}

      <Eyebrow p={p} style={{marginTop:16,marginBottom:10}}>Injection log</Eyebrow>
      {logs.length===0&&<div style={{textAlign:'center',padding:'32px 20px',color:p.inkMuted,fontFamily:TYPE.mono,fontSize:12}}>No injections logged yet. Tap a peptide on the Today tab to start.</div>}
      {[...logs].sort((a,b)=>{const ta=`${b.date}T${b.time||'00:00'}`,tb=`${a.date}T${a.time||'00:00'}`;return ta.localeCompare(tb);}).map(log=>{
        const pt=allPeptides.find(x=>x.id===log.peptideId);
        if(!pt)return null;
        const tLabel=(TIMING_OPTIONS.find(t=>t.value===log.timing)||{}).label;
        return <button key={log.id} onClick={()=>setEditLog(log)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:p.bgElev,border:`0.5px solid ${p.line}`,borderRadius:R.lg,marginBottom:8,cursor:'pointer',textAlign:'left'}}>
          <div style={{width:36,height:36,borderRadius:18,background:pt.color+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icons.Flask size={16} color={pt.color}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>{pt.name}</div>
            <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginTop:2,letterSpacing:'0.04em'}}>
              {fmtDate(log.date,{weekday:'short',month:'short',day:'numeric'}).toUpperCase()}{log.time?` · ${log.time}`:''}{log.site?` · ${log.site}`:''}{tLabel?` · ${tLabel}`:''}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontFamily:TYPE.display,fontSize:18,color:pt.color,lineHeight:0.9}}>{log.dose}<span style={{fontSize:11,opacity:0.7}}> u</span></div>
            <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginTop:2}}>{fmtDose(log.dose,pt)}</div>
          </div>
          <Icons.Edit size={13} color={p.inkMuted}/>
        </button>;
      })}
    </div>;
  }

  const SUBS=[{k:'today',label:'Today'},{k:'levels',label:'Levels'},{k:'history',label:'History'}];

  return <div style={{background:p.bg,minHeight:'100%',fontFamily:TYPE.ui,color:p.ink}}>
    <div style={{padding:'8px 22px 0'}}>
      <Eyebrow p={p} style={{marginBottom:6}}>Peptide Protocol</Eyebrow>
      <div style={{fontFamily:TYPE.display,fontSize:36,color:p.ink,letterSpacing:'-0.025em',lineHeight:0.95,marginBottom:16}}>
        Peptides
      </div>
    </div>

    <div style={{display:'flex',padding:'0 22px',borderBottom:`0.5px solid ${p.line}`,marginBottom:14,gap:4}}>
      {SUBS.map(v=>(
        <button key={v.k} onClick={()=>setSubView(v.k)} style={{fontFamily:TYPE.mono,fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',padding:'10px 14px 10px 0',color:subView===v.k?p.ink:p.inkMuted,background:'none',border:'none',borderBottom:`2px solid ${subView===v.k?p.ink:'transparent'}`,marginBottom:'-0.5px',cursor:'pointer',transition:'color 0.15s'}}>
          {v.label}
        </button>
      ))}
    </div>

    {subView==='today'?<TodayView/>:subView==='levels'?<LevelsView/>:<HistoryView/>}

    {logSheet&&<Portal><PeptideLogSheet p={p} peptide={allPeptides.find(x=>x.id===logSheet)} onSave={handleSaveLog} onClose={()=>setLogSheet(null)}/></Portal>}
    {editLog&&<Portal><PeptideLogSheet p={p} peptide={allPeptides.find(x=>x.id===editLog.peptideId)} existingLog={editLog} onSave={handleSaveLog} onDelete={handleDeleteLog} onClose={()=>setEditLog(null)}/></Portal>}
    {schedSheet&&<Portal><PeptideScheduleSheet p={p} peptide={allPeptides.find(x=>x.id===schedSheet)} onSaveDays={days=>saveSchedFor(schedSheet,{days})} onSaveTime={time=>saveSchedFor(schedSheet,{time})} onActivate={()=>saveSchedFor(schedSheet,{activated:true})} onReset={()=>resetSchedFor(schedSheet)} onLogNow={()=>{setSchedSheet(null);setLogSheet(schedSheet);}} onClose={()=>setSchedSheet(null)}/></Portal>}
  </div>;
}

// ═══════════════════════════════════════════════
// LOG WEIGHT SHEET
// ═══════════════════════════════════════════════
function LogWeightSheet({p,store,onSave,onClose}){
  const [weight,setWeight]=React.useState('');
  const [date,setDate]=React.useState(localToday());
  function handleSave(){
    const w=parseFloat(weight);
    if(isNaN(w)||w<50||w>700)return;
    const existing=store.weights.find(x=>x.date===date);
    let newWeights;
    if(existing){newWeights=store.weights.map(x=>x.date===date?{...x,weight:w}:x);}
    else{newWeights=[...store.weights,{id:`wt_${Date.now()}`,weight:w,date,notes:''}].sort((a,b)=>a.date.localeCompare(b.date));}
    const ns={...store,weights:newWeights};
    saveStore(ns);onSave(ns);
  }
  return <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)'}}/>
    <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 22px',paddingBottom:'max(32px,env(safe-area-inset-bottom))'}}>
      <div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto 16px'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontFamily:TYPE.display,fontSize:24,color:p.ink}}>Log weight</div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icons.X size={18} color={p.inkMuted}/></button>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginBottom:6,fontWeight:500}}>Date</div>
        <input type="date" value={date} max={localToday()} onChange={e=>setDate(e.target.value)} style={{width:'100%',padding:'12px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:16,color:p.ink,outline:'none'}}/>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginBottom:6,fontWeight:500}}>Weight (lbs)</div>
        <input type="number" placeholder="e.g. 235" value={weight} onChange={e=>setWeight(e.target.value)} autoFocus style={{width:'100%',padding:'12px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:22,color:p.ink,outline:'none'}}/>
      </div>
      <PillBtn p={p} kind="primary" size="lg" onClick={handleSave} disabled={!weight} style={{width:'100%'}} icon={<Icons.Check size={18} color={p.bgElev}/>}>
        Save {weight?`${weight} lbs`:'weight'}
      </PillBtn>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// LOG WATER SHEET
// ═══════════════════════════════════════════════
function LogWaterSheet({p,store,onSave,onClose}){
  const today=localToday();
  const todayEntry=store.water?.find(w=>w.date===today);
  const [oz,setOz]=React.useState(String(todayEntry?.oz||''));
  const goal=store.waterGoalOz||64;
  const quickAmounts=[8,12,16,20,24,32];
  function addOz(add){const current=parseFloat(oz)||0;setOz(String(+(current+add).toFixed(0)));}
  function handleSave(){
    const total=parseFloat(oz)||0;
    if(total<0)return;
    const newWater=[...(store.water||[]).filter(w=>w.date!==today),{id:`w_${Date.now()}`,date:today,oz:total}];
    const ns={...store,water:newWater};
    saveStore(ns);onSave(ns);
  }
  const pct=Math.min(1,(parseFloat(oz)||0)/goal);
  return <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)'}}/>
    <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 22px',paddingBottom:'max(32px,env(safe-area-inset-bottom))'}}>
      <div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto 16px'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontFamily:TYPE.display,fontSize:24,color:p.ink}}>Log water</div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icons.X size={18} color={p.inkMuted}/></button>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <Eyebrow p={p}>Today's total</Eyebrow>
          <span style={{fontFamily:TYPE.mono,fontSize:11,color:p.accent}}>{parseFloat(oz)||0} / {goal} oz</span>
        </div>
        <div style={{height:8,borderRadius:4,background:p.bgInset,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct*100}%`,borderRadius:4,background:p.accent,transition:'width 0.3s'}}/>
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <Eyebrow p={p} style={{marginBottom:10}}>Quick add</Eyebrow>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {quickAmounts.map(a=>(
            <button key={a} onClick={()=>addOz(a)} style={{flex:'1 1 50px',padding:'10px 6px',borderRadius:R.md,background:p.bgInset,border:`0.5px solid ${p.line}`,fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500,cursor:'pointer'}}>+{a} oz</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginBottom:6,fontWeight:500}}>Or set total oz for today</div>
        <input type="number" placeholder="e.g. 64" value={oz} onChange={e=>setOz(e.target.value)} style={{width:'100%',padding:'12px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:18,color:p.ink,outline:'none'}}/>
      </div>
      <PillBtn p={p} kind="accent" size="lg" onClick={handleSave} disabled={!oz} style={{width:'100%'}} icon={<Icons.Drop size={18} color="#fff"/>}>
        Save {oz?`${oz} oz`:'water'}
      </PillBtn>
    </div>
  </div>;
}

function EditWeightForm({p,entry,onSave,onDelete,onClose}){
  const [weight,setWeight]=React.useState(String(entry.weight));
  const [date,setDate]=React.useState(entry.date);
  return <>
    <div style={{marginBottom:14}}>
      <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginBottom:6,fontWeight:500}}>Date</div>
      <input type="date" value={date} max={localToday()} onChange={e=>setDate(e.target.value)} style={{width:'100%',padding:'12px 14px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:16,color:p.ink,outline:'none'}}/>
    </div>
    <div style={{marginBottom:20}}>
      <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginBottom:6,fontWeight:500}}>Weight (lbs)</div>

    </div>
    <div style={{display:'flex',gap:8}}>

      <PillBtn p={p} kind="primary" onClick={()=>onSave({...entry,weight:parseFloat(weight),date})} disabled={!weight} style={{flex:1}}>Save changes</PillBtn>
    </div>
  </>;
}

// ═══════════════════════════════════════════════
// SCREEN: WEIGHT
// ═══════════════════════════════════════════════
function ScreenWeight({p,store,onUpdate,onLogWeight,onUndo}){
  const NOW=Date.now();
  const [editingWeight,setEditingWeight]=React.useState(null);
  const wts=(store.weights||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const current=wts.length?wts[wts.length-1].weight:null;
  const start=store.startWeight,goal=store.goalWeight;
  const totalLost=start&&current?+(start-current).toFixed(1):null;
  const toGo=goal&&current?+(current-goal).toFixed(1):null;
  const pct=start&&goal&&current?Math.min(100,Math.round(((start-current)/(start-goal))*100)):0;
  const fourWeeksIdx=Math.max(0,wts.length-15);
  const fourWeeksAgo=wts.length>1?wts[fourWeeksIdx].weight:null;
  const pace=fourWeeksAgo&&current?+((fourWeeksAgo-current)/4).toFixed(2):null;
  const weeksToGoal=pace&&pace>0&&toGo?Math.ceil(toGo/pace):null;
  const goalDate=weeksToGoal?new Date(NOW+weeksToGoal*7*86400000):null;
  const today=localToday();
  const todayWater=store.water?.find(w=>w.date===today);
  const waterGoal=store.waterGoalOz||64;
  const waterOz=todayWater?.oz||0;
  const waterPct=Math.min(1,waterOz/waterGoal);
  const W=358,H=180,padL=14,padR=14,padT=20,padB=32,plotW=W-padL-padR,plotH=H-padT-padB;
  const allW=wts.map(w=>w.weight);
  const wMin=allW.length?(goal?Math.min(...allW,goal):Math.min(...allW))-3:100;
  const wMax=allW.length?(start?Math.max(...allW,start):Math.max(...allW))+3:300;
  const wRange=(wMax-wMin)||1;
  const tFirst=wts.length?new Date(wts[0].date).getTime():NOW-86400000*30;
  const tLast=Math.max(wts.length?new Date(wts[wts.length-1].date).getTime():NOW, NOW);
  const tRange=(tLast-tFirst)||86400000;
  const xT=t=>padL+((t-tFirst)/tRange)*plotW;
  const yW=v=>padT+plotH-((v-wMin)/wRange)*plotH;
  const linePath=wts.length>1?wts.map((w,i)=>`${i===0?'M':'L'} ${xT(new Date(w.date).getTime()).toFixed(1)} ${yW(w.weight).toFixed(1)}`).join(' '):'';
  const areaPath=linePath?linePath+` L ${xT(tLast).toFixed(1)} ${padT+plotH} L ${padL} ${padT+plotH} Z`:'';

  return <div style={{padding:'8px 0 110px',fontFamily:TYPE.ui,background:p.bg,minHeight:'100%'}}>
    <ScreenHeader p={p} eyebrow="Body weight"
      title={totalLost&&totalLost>0?<span>Down <span style={{fontStyle:'italic',color:p.accent}}>{totalLost}</span> lbs</span>:<span style={{fontStyle:'italic'}}>Weight</span>}
      sub={start&&store.startDate?`Since ${fmtDate(store.startDate,{month:'long',day:'numeric'})} · ${Math.round((NOW-new Date(store.startDate))/(86400000*7))} weeks in`:'Track your progress'}
      action={<button onClick={onLogWeight} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:R.pill,background:p.bgInset,color:p.ink,border:`0.5px solid ${p.line}`,fontFamily:TYPE.ui,fontSize:12,fontWeight:500,cursor:'pointer'}}><Icons.Plus size={14}/> Log</button>}
    />
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p} padding={16}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{width:56,height:56,borderRadius:28,background:p.accentSoft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:`${waterPct*100}%`,background:`${p.accent}40`,transition:'height 0.5s'}}/>
            <Icons.Drop size={22} color={p.accent} style={{position:'relative'}}/>
          </div>
          <div style={{flex:1}}>
            <Eyebrow p={p} style={{marginBottom:4}}>Water today</Eyebrow>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span style={{fontFamily:TYPE.display,fontSize:32,color:p.ink,letterSpacing:'-0.02em',lineHeight:0.9}}>{waterOz}</span>
              <span style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft}}>/ {waterGoal} oz</span>
            </div>
            <div style={{height:5,borderRadius:3,background:p.bgInset,marginTop:8,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${waterPct*100}%`,borderRadius:3,background:p.accent,transition:'width 0.5s'}}/>
            </div>
          </div>
        </div>
      </Card>
    </div>
    {start&&goal&&current&&<div style={{padding:'0 16px 14px'}}>
      <Card p={p} padding={18}>
        <div style={{display:'flex',alignItems:'center',gap:20}}>
          <Ring size={100} stroke={10} value={pct} max={100} color={p.weight} track={p.weightSoft} p={p}>
            <div style={{textAlign:'center'}}><div style={{fontFamily:TYPE.display,fontSize:22,color:p.weight,lineHeight:0.9}}>{pct}%</div><div style={{fontFamily:TYPE.ui,fontSize:9,color:p.inkMuted,marginTop:2}}>to goal</div></div>
          </Ring>
          <div style={{flex:1}}>
            <div style={{fontFamily:TYPE.display,fontSize:40,color:p.ink,lineHeight:0.9,letterSpacing:'-0.02em'}}>{current}</div>
            <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,marginTop:4}}>lbs current</div>
            <div style={{display:'flex',gap:16,marginTop:10}}>
              <div><div style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,letterSpacing:'0.1em'}}>START</div><div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>{start} lbs</div></div>
              <div><div style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,letterSpacing:'0.1em'}}>GOAL</div><div style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,fontWeight:500}}>{goal} lbs</div></div>
              {toGo>0&&<div><div style={{fontFamily:TYPE.mono,fontSize:9,color:p.inkMuted,letterSpacing:'0.1em'}}>TO GO</div><div style={{fontFamily:TYPE.ui,fontSize:13,color:p.weight,fontWeight:500}}>{toGo} lbs</div></div>}
            </div>
            {goalDate&&toGo>0&&<div style={{fontFamily:TYPE.ui,fontSize:11,color:p.success,marginTop:6}}>Projected: {fmtDate(goalDate,{month:'short',year:'numeric'})} at current pace</div>}
          </div>
        </div>
      </Card>
    </div>}
    {wts.length>1&&<div style={{padding:'0 16px 14px'}}>
      <Card p={p} padding={0} style={{overflow:'hidden'}}>
        <div style={{padding:'16px 18px 4px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <Eyebrow p={p}>Progress</Eyebrow>
          {goal&&<span style={{fontFamily:TYPE.ui,fontSize:11,color:p.success}}>— goal line</span>}
        </div>
        <div style={{padding:'0 14px 8px'}}>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`}>
            <defs><linearGradient id="wtFill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={p.weight} stopOpacity="0.2"/><stop offset="100%" stopColor={p.weight} stopOpacity="0"/></linearGradient></defs>
            {[0.25,0.5,0.75].map((g,i)=>(<line key={i} x1={padL} x2={W-padR} y1={padT+plotH*g} y2={padT+plotH*g} stroke={p.chartGrid} strokeWidth="0.5" strokeDasharray="3 4"/>))}
            {[0,0.5,1].map((g,i)=>{const wVal=(wMax-g*(wMax-wMin)).toFixed(0);return <text key={i} x={padL-2} y={padT+plotH*g+4} textAnchor="end" fill={p.inkMuted} style={{fontFamily:TYPE.mono,fontSize:9}}>{wVal}</text>;})}
            {goal&&<line x1={padL} x2={W-padR} y1={yW(goal)} y2={yW(goal)} stroke={p.success} strokeWidth="1.5" strokeDasharray="5 4"/>}
            {start&&wts.length>0&&<line x1={padL} x2={W-padR} y1={yW(start)} y2={yW(start)} stroke={p.inkMuted} strokeWidth="0.5" strokeDasharray="2 4"/>}
            <path d={areaPath} fill="url(#wtFill2)"/>
            <path d={linePath} stroke={p.weight} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            {wts.map((w,i)=>(<circle key={w.id} cx={xT(new Date(w.date).getTime())} cy={yW(w.weight)} r={i===wts.length-1?5:3} fill={p.weight} stroke={p.bgElev} strokeWidth="1.5"/>))}
            {wts.length>0&&[0,Math.floor(wts.length/2),wts.length-1].filter((v,i,a)=>a.indexOf(v)===i).map(i=>(<text key={i} x={xT(new Date(wts[i].date).getTime())} y={H-4} textAnchor="middle" fill={p.inkMuted} style={{fontFamily:TYPE.mono,fontSize:9}}>{fmtDate(wts[i].date,{month:'short',day:'numeric'}).toUpperCase()}</text>))}
          </svg>
        </div>
      </Card>
    </div>}
    {wts.length>0&&<><div style={{padding:'8px 22px 8px'}}><Eyebrow p={p}>History</Eyebrow></div>
    <div style={{padding:'0 16px 16px'}}>
      <Card p={p} padding={0}>
        {[...wts].reverse().map((w,i,arr)=>{
          const prev=arr[i+1];
          const delta=prev?+(w.weight-prev.weight).toFixed(1):null;
          return <button key={w.id} onClick={()=>setEditingWeight(w)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 18px',borderBottom:i===arr.length-1?'none':`0.5px solid ${p.lineSoft}`,background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            <div style={{width:36,height:36,borderRadius:18,background:p.weightSoft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icons.Weight size={16} color={p.weight}/></div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                <span style={{fontFamily:TYPE.display,fontSize:22,color:p.ink,letterSpacing:'-0.02em'}}>{w.weight}</span>
                <span style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkSoft}}>lbs</span>
                {delta!==null&&delta!==0&&<Delta value={delta} unit=" lbs" p={p} invert style={{fontSize:11}}/>}
              </div>
              <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginTop:1}}>{fmtDate(w.date,{weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase()}</div>
            </div>
            <Icons.Edit size={13} color={p.inkMuted}/>
          </button>;
        })}
      </Card>
    </div></>}
    {editingWeight&&<Portal><div style={{position:'fixed',inset:0,zIndex:600,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div onClick={()=>setEditingWeight(null)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)'}}/>
      <div style={{position:'relative',background:p.bgElev,borderRadius:'22px 22px 0 0',padding:'16px 22px',paddingBottom:'max(32px,env(safe-area-inset-bottom))'}}>
        <div style={{width:40,height:4,borderRadius:2,background:p.line,margin:'0 auto 16px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontFamily:TYPE.display,fontSize:24,color:p.ink}}>Edit entry</div>
          <button onClick={()=>setEditingWeight(null)} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icons.X size={18} color={p.inkMuted}/></button>
        </div>
        <EditWeightForm p={p} entry={editingWeight}
          onSave={updated=>{const ns={...store,weights:store.weights.map(w=>w.id===updated.id?updated:w).sort((a,b)=>a.date.localeCompare(b.date))};saveStore(ns);onUpdate(ns);setEditingWeight(null);}}
          onDelete={id=>{const prev=store;const ns={...store,weights:store.weights.filter(w=>w.id!==id)};saveStore(ns);onUpdate(ns);setEditingWeight(null);onUndo&&onUndo('Entry deleted',()=>{saveStore(prev);onUpdate(prev);});}}
          onClose={()=>setEditingWeight(null)}
        />
      </div>
    </div></Portal>}
  </div>;
}

// ═══════════════════════════════════════════════
// SCREEN: SETTINGS
// ═══════════════════════════════════════════════
function ScreenSettings({p,store,onUpdate}){
  const [editingMed,setEditingMed]=React.useState(false);
  const [name,setName]=React.useState(store.userName||'');
  const [startWeight,setStartWeight]=React.useState(store.startWeight!=null?String(store.startWeight):'');
  const [goalWeight,setGoalWeight]=React.useState(store.goalWeight!=null?String(store.goalWeight):'');
  const [waterGoal,setWaterGoal]=React.useState(String(store.waterGoalOz||64));
  const [reminderTime,setReminderTime]=React.useState(store.reminderTime||'21:00');
  const fileRef=React.useRef(null);
  const med=store.meds[0];
  const backupAge=daysSinceISO(store.lastBackupAt);

  function patch(partial){const ns={...store,...partial};saveStore(ns);onUpdate(ns);}
  function commitName(){if((store.userName||'')!==name.trim())patch({userName:name.trim()});}
  function commitWeights(){
    const sw=parseFloat(startWeight),gw=parseFloat(goalWeight);
    patch({startWeight:isNaN(sw)?null:sw,goalWeight:isNaN(gw)?null:gw});
  }
  function commitWater(){const g=parseInt(waterGoal,10);if(g>0)patch({waterGoalOz:g});}

  function handleMedSave(m){const ns={...store,meds:[m]};saveStore(ns);onUpdate(ns);setEditingMed(false);}

  function exportData(){
    const ns={...store,lastBackupAt:new Date().toISOString()};
    saveStore(ns);onUpdate(ns);
    const data={app:'Vital',version:2,exportedAt:ns.lastBackupAt,glp1:ns,peptides:loadPeptideLogs()};
    downloadFile(JSON.stringify(data,null,2),`vital-backup-${localToday()}.json`,'application/json');
  }
  function handleImportFile(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.glp1)saveStore(data.glp1);
        if(Array.isArray(data.peptides))savePeptideLogs(data.peptides);
        else if(data.peptides&&Array.isArray(data.peptides.logs))savePeptideLogs(data.peptides.logs);
        window.location.reload();
      }catch(err){alert('That file could not be read as a Vital backup.');}
    };
    reader.readAsText(file);
  }

  const palettes=Object.entries(PALETTES);

  if(editingMed)return <MedSetupForm p={p} initialMed={med} onSave={handleMedSave} onCancel={()=>setEditingMed(false)} title="Edit medication"/>;

  return <div style={{padding:'8px 0 110px',fontFamily:TYPE.ui,background:p.bg,minHeight:'100%'}}>
    <ScreenHeader p={p} eyebrow="Preferences" title={<>Set<span style={{fontStyle:'italic'}}>tings</span></>}/>

    {/* Profile */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:12}}>Profile</Eyebrow>
        <InputField label="Your name" value={name} onChange={setName} p={p} placeholder="First name"/>
        <div onBlur={commitName}/>
        <PillBtn p={p} kind="tint" size="sm" onClick={commitName} style={{marginTop:2}}>Save name</PillBtn>
      </Card>
    </div>

    {/* Medication */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p} padding={0}>
        <div style={{padding:'16px 18px 12px'}}><Eyebrow p={p}>Medication</Eyebrow></div>
        <button onClick={()=>setEditingMed(true)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'4px 18px 16px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
          <div style={{width:40,height:40,borderRadius:20,background:p.primarySoft,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icons.Pill size={18} color={p.primary}/></div>
          <div style={{flex:1,minWidth:0}}>
            {med?<>
              <div style={{fontFamily:TYPE.ui,fontSize:15,color:p.ink,fontWeight:500}}>{med.name} · {med.currentDose} {med.unit}</div>
              <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkMuted,marginTop:2}}>
                {med.scheduleDays?.length?med.scheduleDays.map(d=>DAYS[d]).join(', '):`Every ${med.scheduleIntervalDays||7} days`} · half-life {med.halfLifeDays}d
              </div>
            </>:<div style={{fontFamily:TYPE.ui,fontSize:14,color:p.ink}}>Tap to set up your medication →</div>}
          </div>
          <Icons.ChevRight size={18} color={p.inkMuted}/>
        </button>
      </Card>
    </div>

    {/* Goals */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:12}}>Weight goal</Eyebrow>
        <InputField label="Starting weight" value={startWeight} onChange={setStartWeight} type="number" p={p} suffix="lbs"/>
        <InputField label="Goal weight" value={goalWeight} onChange={setGoalWeight} type="number" p={p} suffix="lbs"/>
        <PillBtn p={p} kind="tint" size="sm" onClick={commitWeights}>Save goal</PillBtn>
      </Card>
    </div>

    {/* Water goal */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:12}}>Daily water goal</Eyebrow>
        <InputField value={waterGoal} onChange={setWaterGoal} type="number" p={p} suffix="oz" hint="Used for the water progress ring on Today"/>
        <PillBtn p={p} kind="tint" size="sm" onClick={commitWater}>Save water goal</PillBtn>
      </Card>
    </div>

    {/* Shot reminders */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:6}}>Shot reminders</Eyebrow>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,lineHeight:1.5,marginBottom:14}}>
          Adds a repeating event to your phone's calendar that matches your shot schedule — so you get a native alert even when Vital is closed.
        </div>
        {med?<>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span style={{fontFamily:TYPE.ui,fontSize:13,color:p.ink,flex:1}}>Remind me at</span>
            <input type="time" value={reminderTime} onChange={e=>setReminderTime(e.target.value)} onBlur={()=>patch({reminderTime})} style={{padding:'10px 12px',background:p.bgInset,border:`0.5px solid ${p.line}`,borderRadius:R.md,fontFamily:TYPE.ui,fontSize:15,color:p.ink,outline:'none'}}/>
          </div>
          <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginBottom:12,letterSpacing:'0.03em'}}>
            {med.scheduleDays&&med.scheduleDays.length?`REPEATS ${med.scheduleDays.map(d=>DAYS[d].toUpperCase()).join(', ')}`:`REPEATS EVERY ${med.scheduleIntervalDays||7} DAYS`}
          </div>
          <PillBtn p={p} kind="primary" onClick={()=>{patch({reminderTime});downloadFile(generateICS(med,reminderTime),'vital-shot-reminder.ics','text/calendar');}} icon={<Icons.Clock size={15} color={p.bgElev}/>} style={{width:'100%'}}>Add to Apple Calendar</PillBtn>
          <div style={{fontFamily:TYPE.ui,fontSize:11,color:p.inkMuted,marginTop:10,lineHeight:1.5}}>Re-add if you change your schedule. True in-app push needs a server, so this uses your calendar for alerts that actually fire.</div>
        </>:<div style={{fontFamily:TYPE.ui,fontSize:13,color:p.inkMuted}}>Set up your medication first to enable reminders.</div>}
      </Card>
    </div>

    {/* Appearance */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:12}}>Appearance</Eyebrow>
        <div style={{display:'flex',gap:8}}>
          {palettes.map(([key,pal])=>{
            const on=(store.palette||'cream')===key;
            return <button key={key} onClick={()=>patch({palette:key})} style={{flex:1,padding:'14px',borderRadius:R.md,background:on?p.primarySoft:p.bgInset,border:`0.5px solid ${on?p.primary:p.line}`,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
              <div style={{display:'flex',gap:4}}>
                <span style={{width:16,height:16,borderRadius:8,background:pal.bg,border:`0.5px solid ${pal.line}`}}/>
                <span style={{width:16,height:16,borderRadius:8,background:pal.primary}}/>
                <span style={{width:16,height:16,borderRadius:8,background:pal.accent}}/>
              </div>
              <span style={{fontFamily:TYPE.ui,fontSize:13,color:on?p.primary:p.ink,fontWeight:500}}>{pal.name}</span>
            </button>;
          })}
        </div>
      </Card>
    </div>

    {/* Data & privacy */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p}>
        <Eyebrow p={p} style={{marginBottom:6}}>Data & privacy</Eyebrow>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,lineHeight:1.5,marginBottom:12}}>
          Everything lives on this device only — no accounts, no cloud. Back up to a file you control, or restore from one.
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:R.md,background:(backupAge==null||backupAge>14)?p.accentSoft:p.bgInset,marginBottom:12}}>
          <span style={{width:7,height:7,borderRadius:4,background:(backupAge==null||backupAge>14)?p.accent:p.success,flexShrink:0}}/>
          <span style={{fontFamily:TYPE.mono,fontSize:11,color:(backupAge==null||backupAge>14)?p.accent:p.inkSoft}}>{backupAge==null?'Never backed up — export now to be safe':backupAge===0?'Last backup: today':`Last backup: ${backupAge}d ago`}</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <PillBtn p={p} kind="ghost" onClick={exportData} icon={<Icons.Download size={15} color={p.ink}/>} style={{flex:1}}>Export</PillBtn>
          <PillBtn p={p} kind="ghost" onClick={()=>fileRef.current&&fileRef.current.click()} icon={<Icons.Upload size={15} color={p.ink}/>} style={{flex:1}}>Import</PillBtn>
        </div>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleImportFile} style={{display:'none'}}/>
        <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,marginTop:10}}>Importing replaces current data and reloads the app.</div>
      </Card>
    </div>

    {/* About */}
    <div style={{padding:'0 16px 14px'}}>
      <Card p={p} soft>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
          <div style={{width:36,height:36,borderRadius:18,background:p.primary,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icons.Spark size={18} color={p.primaryInk}/></div>
          <div>
            <div style={{fontFamily:TYPE.display,fontSize:22,color:p.ink,letterSpacing:'-0.02em'}}>Vital</div>
            <div style={{fontFamily:TYPE.mono,fontSize:10,color:p.inkMuted,letterSpacing:'0.08em'}}>GLP-1 & PEPTIDE TRACKER</div>
          </div>
        </div>
        <div style={{fontFamily:TYPE.ui,fontSize:12,color:p.inkSoft,lineHeight:1.55}}>
          A private space to track your protocol. Drug-level forecasts are estimates from published pharmacokinetics, not clinical measurements — always follow your own clinician's guidance.
        </div>
      </Card>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════
function VitalApp(){
  const [store,setStore]=React.useState(()=>loadStore());
  const [tab,setTab]=React.useState('today');
  const [actionOpen,setActionOpen]=React.useState(false);
  const [shotSheet,setShotSheet]=React.useState(null);   // blank-or-existing shot for the log/edit sheet
  const [weightSheet,setWeightSheet]=React.useState(false);
  const [waterSheet,setWaterSheet]=React.useState(false);
  const [savedFlash,setSavedFlash]=React.useState(false);
  const [undo,setUndo]=React.useState(null);
  const undoTimer=React.useRef(null);

  const p=PALETTES[(store&&store.palette)||'cream'];

  React.useEffect(()=>{
    document.documentElement.style.background=p.bg;
    document.body.style.background=p.bg;
    const meta=document.querySelector('meta[name=theme-color]');
    if(meta)meta.setAttribute('content',p.primary);
  },[p]);

  function flash(){setSavedFlash(true);setTimeout(()=>setSavedFlash(false),1500);}
  function update(ns){setStore(ns);flash();}
  function requestUndo(label,fn){
    if(undoTimer.current)clearTimeout(undoTimer.current);
    setUndo({label,fn});
    undoTimer.current=setTimeout(()=>setUndo(null),5000);
  }
  function doUndo(){if(undo&&undo.fn)undo.fn();if(undoTimer.current)clearTimeout(undoTimer.current);setUndo(null);}

  // ── New GLP-1 shot (reuses the shot sheet) ──
  function startLogShot(){
    const med=store&&store.meds[0];
    setActionOpen(false);
    if(!med){setTab('settings');return;}
    setShotSheet({id:`shot_${Date.now()}`,medId:med.id,dose:med.currentDose,unit:med.unit,date:new Date().toISOString(),site:'L. Abdomen',notes:''});
  }
  function saveShot(s){
    const exists=store.shots.some(x=>x.id===s.id);
    const shots=(exists?store.shots.map(x=>x.id===s.id?s:x):[...store.shots,s]).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const ns={...store,shots};saveStore(ns);setStore(ns);setShotSheet(null);flash();
  }
  function deleteShot(id){
    const prev=store;
    const ns={...store,shots:store.shots.filter(x=>x.id!==id)};
    saveStore(ns);setStore(ns);setShotSheet(null);
    requestUndo('Shot deleted',()=>{saveStore(prev);setStore(prev);});
  }

  if(!store)return <Onboarding p={p} onComplete={s=>setStore(s)}/>;

  const med=store.meds[0];
  const tabs=[
    {key:'today',label:'Today',icon:Icons.Home},
    {key:'levels',label:'Levels',icon:Icons.Wave},
    {key:'peptides',label:'Peptides',icon:Icons.Flask},
    {key:'weight',label:'Weight',icon:Icons.Weight},
    {key:'settings',label:'Settings',icon:Icons.Gear},
  ];

  return <div style={{position:'absolute',inset:0,background:p.bg,overflow:'hidden'}}>
    <div style={{position:'absolute',inset:0,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
      {tab==='today'&&<ScreenToday p={p} store={store} onLogShot={startLogShot} onGoTab={setTab} onUpdate={update} onLogWeight={()=>setWeightSheet(true)} onUndo={requestUndo}/>}
      {tab==='levels'&&<ScreenLevels p={p} store={store} onUpdate={update} onUndo={requestUndo}/>}
      {tab==='peptides'&&<ScreenPeptides p={p} onUndo={requestUndo}/>}
      {tab==='weight'&&<ScreenWeight p={p} store={store} onUpdate={update} onLogWeight={()=>setWeightSheet(true)} onUndo={requestUndo}/>}
      {tab==='settings'&&<ScreenSettings p={p} store={store} onUpdate={update}/>}
    </div>

    <TabBar tabs={tabs} active={tab} onTab={setTab} p={p} onAction={()=>setActionOpen(true)}/>

    {savedFlash&&<div style={{position:'fixed',top:'max(16px,env(safe-area-inset-top))',left:'50%',zIndex:600,transform:'translateX(-50%)',background:p.ink,color:p.bgElev,padding:'8px 16px',borderRadius:R.pill,fontFamily:TYPE.ui,fontSize:13,fontWeight:500,display:'flex',alignItems:'center',gap:6,boxShadow:`0 6px 18px ${p.ink}40`,animation:'flashIn 0.25s ease'}}>
      <Icons.Check size={14} color={p.bgElev}/> Saved
    </div>}

    {undo&&<Portal><UndoToast p={p} label={undo.label} onUndo={doUndo}/></Portal>}

    {actionOpen&&<QuickActionSheet p={p}
      onShot={startLogShot}
      onPeptide={()=>{setActionOpen(false);setTab('peptides');}}
      onWeight={()=>{setActionOpen(false);setWeightSheet(true);}}
      onWater={()=>{setActionOpen(false);setWaterSheet(true);}}
      onClose={()=>setActionOpen(false)}/>}

    {shotSheet&&<EditShotSheet p={p} shot={shotSheet} med={med} onSave={saveShot} onDelete={deleteShot} onClose={()=>setShotSheet(null)}/>}
    {weightSheet&&<LogWeightSheet p={p} store={store} onSave={ns=>{setStore(ns);setWeightSheet(false);flash();}} onClose={()=>setWeightSheet(false)}/>}
    {waterSheet&&<LogWaterSheet p={p} store={store} onSave={ns=>{setStore(ns);setWaterSheet(false);flash();}} onClose={()=>setWaterSheet(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<VitalApp/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
